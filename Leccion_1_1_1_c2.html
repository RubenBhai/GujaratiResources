<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Consonante ર &middot; Piensa en Gujarati</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Noto+Serif+Gujarati:wght@400;500;600;700&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">

<!-- Vinculamos tu tema de lectura oscura y relajante -->
<link rel="stylesheet" href="tema-amigable_3.css">
</head>
<body>

<nav class="nav-bar">
  <a class="nav-btn" href="Leccion_1_1_1_c1.html">&larr; Anterior</a>
  <a class="nav-btn home" href="Leccion_1_1_1_intro.html">&#127968;</a>
  <a class="nav-btn" href="Leccion_1_1_1_c3.html">Siguiente &rarr;</a>
</nav>

<div class="wrap">
  <span class="badge">Consonante 2 de 4</span>
  
  <!-- El frame-img ahora tendrá automáticamente el aura gracias al nuevo CSS -->
  <div class="frame-img">
    <img src="https://rubenbhai.github.io/GujaratiResources/imagenes/Clase_1_1/img_alfa_ra.png" alt="Consonante ર" onerror="this.style.display='none'" onclick="window.location.href='Leccion_1_1_1_c3.html'" style="cursor:pointer">
    <div class="frame-img-label">Letra gujarati</div>
  </div>
  
  <div class="frame-audio">
    <div class="frame-audio-top">
      <div class="frame-audio-label">Suena como</div>
      <div class="frame-audio-desc">Suena como la <strong>r</strong> suave de ca<strong>r</strong>o. No es la <strong>rr</strong> fuerte de perro.</div>
    </div>
    <button class="frame-audio-btn" onclick="playAudio('https://rubenbhai.github.io/GujaratiResources/audios/alfabeto/c27_ra-mujer.mp3', this)">&#128266; Escuchar</button>
  </div>
</div>

<div class="bottom-actions">
  <a class="btn-fin" href="Leccion_1_1_1_v1.html">&#128221; Ir a palabras</a>
  <a class="btn-sec" href="Leccion_1_1_2_intro.html">&#9197; Siguiente lección</a>
</div>

<audio id="player"></audio>

<script>
  window.addEventListener('load', () => {
    setTimeout(() => { document.getElementById('player').src='https://rubenbhai.github.io/GujaratiResources/audios/alfabeto/c27_ra-mujer.mp3'; document.getElementById('player').play().catch(()=>{}); }, 400);
  });

  const player = document.getElementById('player');
  
  function playAudio(url, btn) {
    document.querySelectorAll('.frame-audio-btn').forEach(b => b.classList.remove('playing'));
    btn.classList.add('playing');
    btn.textContent = '▶ Reproduciendo...';
    player.src = url; 
    player.playbackRate = 1.0; 
    player.play();
    player.onended = () => { btn.classList.remove('playing'); btn.innerHTML = '&#128266; Escuchar'; };
  }
</script>
</body>
</html>
