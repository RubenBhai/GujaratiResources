<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title id="page-title">Piensa en Gujarati</title>

<!-- Fuentes -->
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Noto+Serif+Gujarati:wght@400;500;600;700&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="tema-modulo.css">
</head>
<body>

<nav class="nav-bar">
  <a class="nav-btn" id="nav-atras" href="#">← Atrás</a>
  <a class="nav-btn home" id="nav-home" href="#">🏠</a>
  <span class="nav-btn" style="opacity:0; pointer-events:none;">&nbsp;</span>
</nav>

<div class="wrap-letras">

  <div class="intro-header">
    <span class="modulo-badge" id="badge"></span>
    <h1 id="titulo"></h1>
    <p class="subtitle" id="subtitulo"></p>
  </div>

  <div class="seccion-label" id="label-consonantes"></div>
  <div class="letras-grid" id="grid-consonantes"></div>

  <div class="seccion-label" id="label-vocales"></div>
  <div class="vocales-grid" id="grid-vocales"></div>

  <div class="info-box" id="info-box"></div>

  <div class="seccion-label" id="label-lecciones"></div>
  <div class="lecciones-lista" id="lista-lecciones"></div>

  <a class="btn-empezar" id="btn-empezar" href="#">Empezar →</a>
</div>

<script>
  const _params    = new URLSearchParams(location.search);
  const _moduloRaw = _params.get('modulo') || '1.1';
  const _modulo     = _moduloRaw.replace(/\./g, '_');
  const JSON_URL   = 'data/contenido_modulo_' + _modulo + '.json';

  fetch(JSON_URL + '?t=' + Date.now(), { cache: 'no-store' })
    .then(function(r){ if(!r.ok) throw new Error('404'); return r.json(); })
    .then(function(data){
      document.getElementById('page-title').textContent = data.badge + ' · Piensa en Gujarati';
      document.getElementById('nav-atras').href = data.atras;
      document.getElementById('nav-home').href = data.home;

      document.getElementById('badge').textContent = data.badge;
      document.getElementById('titulo').textContent = data.titulo;
      document.getElementById('subtitulo').innerHTML = data.subtitulo_html;

      document.getElementById('label-consonantes').textContent = 'Las ' + data.consonantes.length + ' consonantes';
      const gridConsonantes = document.getElementById('grid-consonantes');
      data.consonantes.forEach(function(c){
        const div = document.createElement('div');
        div.className = 'letra-card';
        div.innerHTML = '<span class="gu">' + c.gu + '</span><span class="rom">' + c.rom + '</span>';
        gridConsonantes.appendChild(div);
      });

      document.getElementById('label-vocales').textContent = 'Las ' + data.vocales.length + ' vocales';
      const gridVocales = document.getElementById('grid-vocales');
      data.vocales.forEach(function(v){
        const div = document.createElement('div');
        div.className = 'vocal-card';
        div.innerHTML = '<span class="gu">' + v.gu + '</span><span class="rom">' + v.rom + '</span><span class="abrev">' + v.abrev + '</span>';
        gridVocales.appendChild(div);
      });

      document.getElementById('info-box').innerHTML = data.info_box_html;

      document.getElementById('label-lecciones').textContent = 'Las ' + data.lecciones.length + ' lecciones';
      const lista = document.getElementById('lista-lecciones');
      let leccionActiva = null;
      data.lecciones.forEach(function(l){
        const esActiva = (l.estado === 'activa');
        if (esActiva) leccionActiva = l;
        const el = document.createElement(esActiva ? 'a' : 'div');
        el.className = 'leccion ' + l.estado;
        if (esActiva) el.href = 'leccion_intro.html?leccion=' + l.codigo_leccion;
        el.innerHTML =
          '<span class="lec-num">' + l.numero + '</span>' +
          '<div class="lec-info">' +
            '<div class="lec-title">' + l.titulo + '</div>' +
            '<div class="lec-sub">' + l.sub_html + '</div>' +
            '<div class="lec-gu">' + l.gu + '</div>' +
          '</div>' +
          (esActiva ? '<span class="lec-status">▶</span>' : '<span class="lec-soon">Muy pronto</span>');
        lista.appendChild(el);
      });

      const btnEmpezar = document.getElementById('btn-empezar');
      if (leccionActiva) {
        btnEmpezar.href = 'leccion_intro.html?leccion=' + leccionActiva.codigo_leccion;
        btnEmpezar.textContent = 'Empezar con la Lección ' + leccionActiva.numero + ' →';
      } else {
        btnEmpezar.style.display = 'none';
      }
    })
    .catch(function(){
      document.body.innerHTML =
        '<p style="text-align:center;color:var(--ink-soft);padding:40px;">No se pudo cargar el contenido. Revisa tu conexión.</p>';
    });
</script>

<script>
(function() {
  var VERSION_URL = 'https://rubenbhai.github.io/GujaratiResources/version.txt';
  fetch(VERSION_URL + '?t=' + Date.now(), { cache: 'no-store' })
    .then(function(r) { return r.text(); })
    .then(function(serverV) {
      serverV = serverV.trim();
      var localV = null;
      try { localV = localStorage.getItem('appVersion'); } catch(e) {}
      if (localV === null) {
        try { localStorage.setItem('appVersion', serverV); } catch(e) {}
      } else if (localV !== serverV) {
        try { localStorage.setItem('appVersion', serverV); } catch(e) {}
        location.reload(true);
      }
    })
    .catch(function() {});
})();
</script>
</body>
</html>
