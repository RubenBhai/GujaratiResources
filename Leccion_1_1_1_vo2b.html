<div class="bottom-actions" style="max-width:320px; margin:0 auto; padding:0 0 24px 0; gap:10px;">
  <button class="btn-sec" style="border:none; cursor:pointer; font-family:inherit;" onclick="playSecuencia(this)" id="btn-escuchar">&#128266; Toca aquí y escucharás: kaa, maa y chhaa</button>

<audio id="player"></audio>

<script>
  const player = document.getElementById('player');
  const SECUENCIA = ['https://rubenbhai.github.io/GujaratiResources/audios/clase_1_1/audio_m_kaa.mp3', 'https://rubenbhai.github.io/GujaratiResources/audios/clase_1_1/audio_m_maa.mp3', 'https://rubenbhai.github.io/GujaratiResources/audios/clase_1_1/audio_m_chhaa.mp3'];
  let seqIdx = 0;

  function playSecuencia(btn) {
    btn.classList.add('playing');
    btn.textContent = '▶ Reproduciendo...';
    seqIdx = 0;
    reproducirSiguiente(btn);
  }

  function reproducirSiguiente(btn) {
    if (seqIdx >= SECUENCIA.length) {
      btn.classList.remove('playing');
      btn.innerHTML = '&#128266; Toca aquí y escucharás: kaa, maa y chhaa';
      return;
    }
    player.src = SECUENCIA[seqIdx];
    player.playbackRate = 1.0;
    player.play();
    player.onended = () => {
      seqIdx++;
      setTimeout(() => reproducirSiguiente(btn), 350);
    };
  }
</script>


<script>
(function() {
  var VERSION_URL = 'https://rubenbhai.github.io/GujaratiResources/version.txt';
  fetch(VERSION_URL + '?t=' + Date.now(), { cache: 'no-store' })
    .then(function(r) { return r.text(); })
    .then(function(serverV) {
      serverV = serverV.trim();
      var localV = null;
      try { localV = localStorage.getItem('appVersion'); } catch(e) {}
      if (localV === null) {
        try { localStorage.setItem('appVersion', serverV); } catch(e) {}
      } else if (localV !== serverV) {
        try { localStorage.setItem('appVersion', serverV); } catch(e) {}
        location.reload(true);
      }
    })
    .catch(function() {});
})();
</script>
