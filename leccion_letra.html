<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title id="page-title">Consonante &middot; Piensa en Gujarati</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Noto+Serif+Gujarati:wght@400;500;600;700&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">

<!-- Vinculamos tu archivo centralizado -->
<link rel="stylesheet" href="tema-amigable_3.css">
</head>
<body>

<nav class="nav-bar">
  <a class="nav-btn disabled" id="nav-anterior" href="javascript:void(0)">&larr; Anterior</a>
  <a class="nav-btn home" id="nav-home" href="#">&#127968;</a>
  <a class="nav-btn" id="nav-palabras" href="#">Ir a palabras</a>
</nav>

<div class="wrap" style="padding-bottom:8px;">
  <span class="badge" id="badge">Consonante</span>

  <div class="frame-img" style="max-width:320px; margin:0 auto;">
    <img id="img-consonante" alt="" onerror="this.style.display='none'" style="cursor:pointer; max-height:380px; object-fit:contain; width:100%;">
  </div>


</div>

<div class="bottom-actions" style="max-width:320px; margin:0 auto; padding:0 0 24px 0; gap:10px;">
  <div style="display:flex; gap:10px;">
    <button class="btn-sec" style="flex:1; margin-top:0; border:none; cursor:pointer; font-family:inherit;" id="btn-escuchar">&#128266; Escuchar</button>
    <a class="btn-fin" style="flex:1; margin-top:0; background:var(--sindoor); box-shadow:0 4px 14px rgba(168,54,42,0.3);" id="btn-practicar" href="#">&#127908; A practicar</a>
  </div>
  <div style="display:flex; gap:10px;">
    <a class="btn-sec" style="flex:1;" id="btn-siguiente-leccion" href="#">&#9197; Sig. lección</a>
    <a class="btn-fin" style="flex:1; margin-top:0;" id="btn-siguiente" href="#">Siguiente &rarr;</a>
  </div>
</div>

<audio id="player"></audio>

<script>
  const BASE   = 'https://rubenbhai.github.io/GujaratiResources';
  const player = document.getElementById('player');

  const _params     = new URLSearchParams(location.search);
  const _leccionRaw = _params.get('leccion') || '1.1.1';
  const _leccion     = _leccionRaw.replace(/\./g, '_');
  const _item       = parseInt(_params.get('item') || '1', 10);
  const JSON_URL    = 'data/leccion_letra_' + _leccion + '.json';

  function playAudio(url, btn) {
    btn.classList.add('playing');
    btn.textContent = '▶ Reproduciendo...';
    player.src = url; player.playbackRate = 1.0; player.play();
    player.onended = () => { btn.classList.remove('playing'); btn.innerHTML = '&#128266; Escuchar'; };
  }

  fetch(JSON_URL + '?t=' + Date.now(), { cache: 'no-store' })
    .then(function(r){ if(!r.ok) throw new Error('404'); return r.json(); })
    .then(function(data){
      const letras = data.letras;
      const total  = letras.length;
      const idx    = Math.min(Math.max(_item, 1), total);
      const actual = letras[idx - 1];

      document.getElementById('page-title').textContent = 'Consonante ' + actual.consonante + ' · Piensa en Gujarati';
      document.getElementById('badge').textContent = 'Consonante ' + idx + ' de ' + total;

      const img = document.getElementById('img-consonante');
      img.src = actual.imagen;
      img.alt = 'Consonante ' + actual.consonante;

      document.getElementById('nav-home').href = data.home;
      document.getElementById('nav-palabras').href = data.ir_a_palabras;

      // Destino "siguiente": próxima consonante, o ir_a_palabras si es la última
      const siguienteUrl = (idx < total)
        ? ('leccion_letra.html?leccion=' + _leccionRaw + '&item=' + (idx + 1))
        : data.ir_a_palabras;
      img.onclick = function(){ window.location.href = siguienteUrl; };

      // "Anterior": deshabilitado si es la primera
      const navAnterior = document.getElementById('nav-anterior');
      if (idx > 1) {
        navAnterior.classList.remove('disabled');
        navAnterior.href = 'leccion_letra.html?leccion=' + _leccionRaw + '&item=' + (idx - 1);
      }

      document.getElementById('btn-practicar').href = 'reto_flash.html?json=' + actual.reto_flash_json;
      document.getElementById('btn-siguiente').href = actual.plana;
      document.getElementById('btn-siguiente-leccion').href = data.siguiente_leccion;

      const btnEscuchar = document.getElementById('btn-escuchar');
      btnEscuchar.onclick = function(){ playAudio(actual.audio, btnEscuchar); };

      // Autoplay al cargar
      setTimeout(function(){
        player.src = actual.audio;
        player.play().catch(function(){});
      }, 400);
    })
    .catch(function(){
      document.body.innerHTML =
        '<p style="text-align:center;color:var(--ink-soft);padding:40px;">No se pudo cargar el contenido. Revisa tu conexión.</p>';
    });
</script>

<script>
(function() {
  var VERSION_URL = 'https://rubenbhai.github.io/GujaratiResources/version.txt';
  fetch(VERSION_URL + '?t=' + Date.now(), { cache: 'no-store' })
    .then(function(r) { return r.text(); })
    .then(function(serverV) {
      serverV = serverV.trim();
      var localV = null;
      try { localV = localStorage.getItem('appVersion'); } catch(e) {}
      if (localV === null) {
        try { localStorage.setItem('appVersion', serverV); } catch(e) {}
      } else if (localV !== serverV) {
        try { localStorage.setItem('appVersion', serverV); } catch(e) {}
        location.reload(true);
      }
    })
    .catch(function() {});
})();
</script>
</body>
</html>
