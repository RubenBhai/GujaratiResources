<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>¡Lección completa! &middot; Piensa en Gujarati</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Noto+Serif+Gujarati:wght@400;700&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="tema-amigable_2.css">
</head>
<body>

<nav class="nav-bar">
  <a class="nav-btn" id="nav-anterior" href="#">← Anterior</a>
  <a class="nav-btn home" id="nav-home" href="#">🏠 Inicio</a>
  <span class="nav-btn disabled">Siguiente →</span>
</nav>

<div class="wrap">

  <div>🏆</div>

  <h1>¡Muy bien!</h1>

  <p class="subtitle" id="subtitle"></p>

  <a class="btn-sec" id="btn-repetir" href="#">← Repetir lección</a>

  <a class="btn-fin" id="btn-aprende" href="#" style="background:linear-gradient(135deg,#B8863D,#A8362A); box-shadow:0 4px 16px rgba(184,134,61,0.4);">🌱 Aprende las palabras de esta lección</a>

  <a class="btn-fin" id="btn-compone" href="#" style="background:linear-gradient(135deg,#5F6E4F,#4A6B53); box-shadow:0 4px 16px rgba(95,110,79,0.4);">🧩 Aprende a crear oraciones</a>

  <a class="btn-fin" id="btn-reto" href="#" style="background:linear-gradient(135deg,#832920,#A8362A); box-shadow:0 4px 16px rgba(131,41,32,0.4);">🏆 Reto — ¿cuánto aprendiste?</a>

  <a class="btn-fin" id="btn-dialogo" href="#" style="background:linear-gradient(135deg,#4a4a4a,#2a2a2a); box-shadow:0 4px 16px rgba(74,74,74,0.4);">🎬👂 Escucha y participa en el diálogo</a>

  <div class="aprendido-box">
    <div class="aprendido-label">✨ Lo que aprendiste</div>
    <div class="aprendido-letras" id="letras-aprendidas"></div>
    <table class="aprendido-tabla" id="tabla-aprendido"></table>
  </div>

  <div class="proxima-box">
    <div class="proxima-label">📚 En la siguiente lección</div>
    <div class="proxima-texto" id="proxima-texto"></div>
    <div class="proxima-letras" id="proxima-letras"></div>
  </div>

  <a class="btn-fin" id="btn-siguiente-leccion" href="#">Siguiente lección →</a>

</div>

<audio id="player"></audio>
<audio id="triunfo" preload="auto">
  <source src="https://rubenbhai.github.io/GujaratiResources/audios/musica/level_complete_01.mp3" type="audio/mpeg">
</audio>

<script>
  const BASE   = 'https://rubenbhai.github.io/GujaratiResources';

  const _params     = new URLSearchParams(location.search);
  const _leccionRaw = _params.get('leccion') || '1.1.1';
  const _leccion     = _leccionRaw.replace(/\./g, '_');
  const JSON_URL    = 'data/leccion_fin_' + _leccion + '.json';

  fetch(JSON_URL + '?t=' + Date.now(), { cache: 'no-store' })
    .then(function(r){ if(!r.ok) throw new Error('404'); return r.json(); })
    .then(function(data){
      // Marcar esta lección como completada
      try { localStorage.setItem('leccion_' + _leccion, 'completada'); } catch(e) {}

      // Sonido de triunfo al llegar al final de la lección
      setTimeout(function() {
        var t = document.getElementById('triunfo');
        if (t) { t.volume = 0.7; t.play().catch(function(){}); }
      }, 350);

      document.getElementById('nav-anterior').onclick = function(){ history.back(); return false; };
      document.getElementById('nav-home').href = 'leccion_intro.html?leccion=' + _leccionRaw;
      document.getElementById('btn-repetir').href = 'leccion_intro.html?leccion=' + _leccionRaw;

      document.getElementById('btn-aprende').href = 'aprende.html?leccion=' + _leccionRaw;
      document.getElementById('btn-compone').href = 'compone.html?leccion=' + _leccionRaw;
      document.getElementById('btn-reto').href = 'reto.html?leccion=' + _leccionRaw;
      document.getElementById('btn-dialogo').href = 'video.html?leccion=' + _leccionRaw + '&next=video_interactivo.html&modo=desafio';

      const r = data.resumen;
      document.getElementById('subtitle').innerHTML =
        'Aprendiste <strong>' + r.consonantes + ' consonantes</strong>, <strong>' + r.vocales + ' vocales</strong> y <strong>' + r.palabras + ' palabras</strong> de verdad.\n      ¡Ya puedes preguntar <span style="font-family:\'Noto Serif Gujarati\',serif;">' + r.frase_ejemplo + '</span>!';

      const letrasCont = document.getElementById('letras-aprendidas');
      data.letras_aprendidas.forEach(function(l){
        const span = document.createElement('span');
        span.className = 'gu';
        span.textContent = l;
        letrasCont.appendChild(span);
      });

      const tabla = document.getElementById('tabla-aprendido');
      data.palabras_aprendidas.forEach(function(p){
        const tr = document.createElement('tr');
        tr.innerHTML =
          '<td class="gu-cell">' + p.gujarati + '</td>' +
          '<td class="pron-cell">' + p.se_dice + '</td>' +
          '<td class="mean-cell">' + p.significa + '</td>';
        tabla.appendChild(tr);
      });

      const prox = data.proxima_leccion;
      document.getElementById('proxima-texto').textContent = 'Aprenderás ' + prox.cantidad_letras + ' letras nuevas:';
      const proxLetrasCont = document.getElementById('proxima-letras');
      prox.letras.forEach(function(l){
        const span = document.createElement('span');
        span.className = 'gu';
        span.textContent = l;
        proxLetrasCont.appendChild(span);
      });
      document.getElementById('btn-siguiente-leccion').href = 'leccion_intro.html?leccion=' + prox.codigo;
    })
    .catch(function(){
      document.body.innerHTML =
        '<p style="text-align:center;color:var(--ink-soft);padding:40px;">No se pudo cargar el contenido. Revisa tu conexión.</p>';
    });
</script>

<script>
(function() {
  var VERSION_URL = 'https://rubenbhai.github.io/GujaratiResources/version.txt';
  fetch(VERSION_URL + '?t=' + Date.now(), { cache: 'no-store' })
    .then(function(r) { return r.text(); })
    .then(function(serverV) {
      serverV = serverV.trim();
      var localV = null;
      try { localV = localStorage.getItem('appVersion'); } catch(e) {}
      if (localV === null) {
        try { localStorage.setItem('appVersion', serverV); } catch(e) {}
      } else if (localV !== serverV) {
        try { localStorage.setItem('appVersion', serverV); } catch(e) {}
        location.reload(true);
      }
    })
    .catch(function() {});
})();
</script>
</body>
</html>
