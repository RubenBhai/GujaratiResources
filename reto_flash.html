<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>A practicar · Piensa en Gujarati</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Noto+Serif+Gujarati:wght@400;600;700&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="tema-reto-flash.css">
</head>
<body>

<nav class="nav-bar">
  <button class="nav-btn" onclick="history.back()">← Volver</button>
  <a class="nav-btn home" href="index.html">🏠</a>
  <span class="nav-btn" style="opacity:0;pointer-events:none;">&nbsp;</span>
</nav>
<div class="top-progress"><div class="top-progress-fill" id="top-fill"></div></div>

<div class="wrap">

  <div class="screen active" id="s-intro">
    <span class="badge">🎙 A practicar</span>
    <h1 id="intro-titulo">Pronuncia lo que aprendiste</h1>
    <p class="lead" id="intro-desc"></p>
    <p class="sesion-info" id="intro-sesiones"></p>
    <button class="btn-main" onclick="iniciarSesion()">¡Empezar! →</button>
    <button class="btn-sec" onclick="history.back()">Ahora no</button>
  </div>

  <div class="screen" id="s-practica">
    <span class="badge" id="practica-badge">Sesión 1 de 1</span>
    <h2 id="practica-titulo"></h2>
    <p class="lead">Lee y graba 🎙 tu pronunciación.</p>
    <div style="width: 100%; max-width: 350px; display: flex; flex-direction: column; align-items: center; gap: 16px; margin: 0 auto;">
      <div class="pronuncia-lista" id="pronuncia-lista"></div>
      <div class="btn-row">
        <button class="btn-sec" id="btn-elem-ant" onclick="anteriorElemento()">← Anterior</button>
        <button class="btn-sec" id="btn-elem-sig" onclick="siguienteElemento()">Siguiente →</button>
      </div>
      <span id="elem-indicador" style="color:var(--ink-soft); font-size:0.9rem; margin-top: -4px;"></span>
      <button class="btn-main" id="btn-verificar" onclick="verificar()" style="display:none;">Verificar ✓</button>
      <div class="btn-row">
        <button class="btn-sec" onclick="repetirSesion()">🔄 Repetir sesión</button>
        <button class="btn-sec" onclick="history.back()">← Volver</button>
      </div>
    </div>
  </div>

  <div class="screen" id="s-resultado">
    <div class="resultado-card">
      <div class="resultado-emoji" id="res-emoji"></div>
      <div class="resultado-msg"   id="res-msg"></div>
      <div class="resultado-pct"   id="res-pct"></div>
      <div class="resultado-detalle" id="res-detalle"></div>
    </div>
    <button class="btn-main" id="btn-siguiente" onclick="siguienteSesion()" style="display:none;">Siguiente sesión →</button>
    <button class="btn-main" onclick="history.back()" style="background:var(--sindoor);">✓ Continuar lección</button>
    <button class="btn-sec"  onclick="repetirDesdeResultado()">🔄 Repetir esta sesión</button>
  </div>

</div>

<audio id="player-self"></audio>
<audio id="sfx"></audio>

<script>
const BACKEND_URL = 'https://gujaratitraining-production.up.railway.app';
const SND_OK  = 'https://rubenbhai.github.io/GujaratiResources/audios/clase_1_1/Clase_1_1_Correcto.mp3';
const SND_ERR = 'https://rubenbhai.github.io/GujaratiResources/audios/clase_1_1/Clase_1_1_Incorrecto.mp3';

const playerSelf = document.getElementById('player-self');
const sfx        = document.getElementById('sfx');

// Leer parámetro ?json=nombre (sin extensión) desde la URL
const _params  = new URLSearchParams(location.search);
const _jsonKey = _params.get('json') || '';   // ej: "Leccion_1_1_1_c3"

// Extraemos automáticamente el código de la lección (ej: "1_1_1") a partir del nombre recibido
const _matchLeccion = _jsonKey.match(/Leccion_(\d+_\d+_\d+)/);
const _folderLeccion = _matchLeccion ? _matchLeccion[1] : '';

// Construimos la ruta dinámica apuntando a la nueva estructura de carpetas
const JSON_URL = _jsonKey && _folderLeccion 
  ? 'data/' + _folderLeccion + '/reto_flash_' + _jsonKey + '.json' 
  : (_jsonKey ? 'data/reto_flash_' + _jsonKey + '.json' : '');

let DATA        = null;
let sesiones    = [];
let sesionIdx   = 0;       // índice de sesión actual (0-based)
let sesionData  = null;

let mediaRecorder = null;
let audioChunks   = {};
let recordingId   = null;
let elemIdx       = 0;   // elemento actual dentro de la sesión

/* ── Utilidades ── */
function goTo(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}
function evalMsg(pct){
  if(pct>=91) return {emoji:'🏆', msg:'¡Felicidades!',   snd:SND_OK};
  if(pct>=81) return {emoji:'⭐', msg:'Muy bien',         snd:SND_OK};
  if(pct>=71) return {emoji:'👍', msg:'Ya casi lo logras',snd:SND_ERR};
  if(pct>=61) return {emoji:'💪', msg:'Vas bien...',      snd:SND_ERR};
  return            {emoji:'🔄', msg:'Reintenta',         snd:SND_ERR};
}

/* ── Pantalla intro ── */
function montarIntro(){
  document.getElementById('intro-titulo').textContent  = DATA.titulo || 'Pronuncia lo que aprendiste';
  document.getElementById('intro-desc').textContent    = DATA.descripcion || '';
  document.getElementById('intro-sesiones').textContent =
    'Tiene ' + sesiones.length + (sesiones.length===1 ? ' sesión' : ' sesiones') + ' de práctica.';
  goTo('s-intro');
}

/* ── Iniciar / cambiar sesión ── */
function iniciarSesion(){
  sesionIdx  = 0;
  montarSesion();
}

function siguienteSesion(){
  sesionIdx++;
  if(sesionIdx < sesiones.length) montarSesion();
  else history.back();
}

function montarSesion(){
  sesionData   = sesiones[sesionIdx];
  audioChunks  = {};
  recordingId  = null;

  var total = sesiones.length;
  document.getElementById('practica-badge').textContent =
    '🎙 Sesión ' + (sesionIdx+1) + ' de ' + total;
  document.getElementById('practica-titulo').textContent =
    sesionData.titulo || ('Sesión ' + (sesionIdx+1));

  actualizarProgreso();

  var lista = document.getElementById('pronuncia-lista');
  lista.innerHTML = '';

  sesionData.elementos.forEach(function(el, i){
    var div = document.createElement('div');
    div.className = 'pronuncia-item';
    div.id = 'item-' + i;
    div.innerHTML =
      '<div class="pi-top">' +
        '<div>' +
          '<div class="pi-gu gu">' + el.gujarati + '</div>' +
          (el.roman ? '<div class="pi-rom">' + el.roman + '</div>' : '') +
        '</div>' +
        '<div class="pi-btns">' +
          '<button class="btn-grabar" id="btn-g-' + i + '" ' +
            'onclick="toggleGrabacion(' + i + ', \'' + el.gujarati.replace(/'/g,"\\'") + '\')">🎙 Grabar</button>' +
        '</div>' +
      '</div>' +
      '<div class="spinner" id="load-' + i + '">⏳ Evaluando...</div>' +
      '<div class="eval-panel" id="eval-' + i + '">' +
        '<div class="eval-nota"    id="nota-'    + i + '"></div>' +
        '<div class="eval-trans"   id="trans-'   + i + '"></div>' +
        '<div class="eval-consejo" id="consejo-' + i + '"></div>' +
      '</div>';
    lista.appendChild(div);
  });

  elemIdx = 0;
  mostrarElemento(0);
  goTo('s-practica');
}

function mostrarElemento(i){
  var items = document.querySelectorAll('#pronuncia-lista .pronuncia-item');
  items.forEach(function(el, idx){ el.style.display = idx === i ? 'block' : 'none'; });
  var total = sesionData.elementos.length;
  document.getElementById('elem-indicador').textContent = (i+1) + ' de ' + total;
  // Flecha izquierda deshabilitada en el primero
  document.getElementById('btn-elem-ant').disabled = (i === 0);
  document.getElementById('btn-elem-ant').style.opacity = (i === 0) ? '0.3' : '1';
  // Flecha derecha deshabilitada en el último
  document.getElementById('btn-elem-sig').disabled = (i === total-1);
  document.getElementById('btn-elem-sig').style.opacity = (i === total-1) ? '0.3' : '1';
  // Mostrar "Verificar" solo cuando todos los elementos tienen nota
  var todosGrabados = sesionData.elementos.every(function(el, idx){
    var notaEl = document.getElementById('nota-' + idx);
    return notaEl && notaEl.textContent.includes('/10');
  });
  document.getElementById('btn-verificar').style.display = todosGrabados ? 'block' : 'none';
}

function anteriorElemento(){
  if(elemIdx > 0){ elemIdx--; mostrarElemento(elemIdx); }
}

function siguienteElemento(){
  var total = sesionData.elementos.length;
  if(elemIdx < total-1){ elemIdx++; mostrarElemento(elemIdx); }
}

function actualizarProgreso(){
  var pct = sesiones.length > 1
    ? Math.round((sesionIdx / sesiones.length) * 100)
    : 0;
  document.getElementById('top-fill').style.width = pct + '%';
}

function repetirSesion(){
  montarSesion();
}

/* ── Grabación ── */
function toggleGrabacion(i, fraseObjetivo){
  var btn = document.getElementById('btn-g-' + i);
  if(recordingId === i){
    mediaRecorder.stop();
    recordingId = null;
    btn.innerHTML = '🎙 Grabar';
    btn.classList.remove('recording');
    return;
  }
  if(mediaRecorder && mediaRecorder.state === 'recording'){
    mediaRecorder.stop();
  }
  recordingId = i;
  navigator.mediaDevices.getUserMedia({audio:true}).then(function(stream){
    mediaRecorder = new MediaRecorder(stream);
    audioChunks[i] = [];
    mediaRecorder.ondataavailable = function(e){
      if(e.data && e.data.size > 0) audioChunks[i].push(e.data);
    };
    mediaRecorder.onstop = function(){
      var tipoReal = mediaRecorder.mimeType || 'audio/webm';
      var blob = new Blob(audioChunks[i], {type: tipoReal});
      convertirYEnviar(blob, i, fraseObjetivo);
      stream.getTracks().forEach(function(t){ t.stop(); });
    };
    mediaRecorder.start();
    btn.innerHTML = '🛑 Detener';
    btn.classList.add('recording');
  }).catch(function(){
    alert('Verifica los permisos de tu micrófono en los ajustes del dispositivo.');
  });
}

function convertirYEnviar(blob, i, fraseObjetivo){
  var reader = new FileReader();
  reader.readAsDataURL(blob);
  reader.onloadend = function(){
    var base64   = reader.result.split(',')[1];
    var mimeType = blob.type || 'audio/webm';
    enviarAGemini(base64, mimeType, fraseObjetivo, i);
  };
}

function enviarAGemini(audioBase64, mimeType, fraseObjetivo, i){
  var spinner = document.getElementById('load-' + i);
  var panel   = document.getElementById('eval-' + i);
  if(spinner) spinner.style.display = 'block';
  if(panel)   panel.style.display   = 'none';

  fetch(BACKEND_URL + '/api/evaluar-audio', {
    method: 'POST',
    headers: {
      'Content-Type':   'application/json',
      'x-access-token': sessionStorage.getItem('accessToken') || ''
    },
    body: JSON.stringify({ audioBase64: audioBase64, mimeType: mimeType, fraseObjetivo: fraseObjetivo })
  })
  .then(function(r){ if(!r.ok) throw new Error('Error servidor'); return r.json(); })
  .then(function(data){
    document.getElementById('nota-'    + i).innerHTML = '⭐ Nota: ' + data.nota + '/10';
    document.getElementById('trans-'   + i).innerHTML = 'Gemini entendió: "' + data.transcripcion + '"';
    document.getElementById('consejo-' + i).innerHTML = '💡 ' + data.consejo;
    document.getElementById('nota-'    + i).style.color = data.nota >= 7 ? 'var(--saffron)' : 'var(--wrong-text)';
    if(panel) panel.style.display = 'block';
    mostrarElemento(elemIdx);   // actualizar botón Verificar si ya están todos
  })
  .catch(function(err){
    console.error(err);
    document.getElementById('nota-' + i).innerHTML = '⚠️ No se pudo conectar con Gemini. Inténtalo de nuevo.';
    if(panel) panel.style.display = 'block';
  })
  .finally(function(){
    if(spinner) spinner.style.display = 'none';
  });
}

/* ── Verificar ── */
function verificar(){
  var notas  = [];
  var detalle = [];
  var todos  = true;

  sesionData.elementos.forEach(function(el, i){
    var notaEl = document.getElementById('nota-' + i);
    if(!notaEl || !notaEl.textContent.includes('/10')){
      todos = false;
      return;
    }
    var match = notaEl.textContent.match(/(\d+(?:\.\d+)?)\/10/);
    if(match){
      var n = parseFloat(match[1]);
      notas.push(n);
      detalle.push({ gu: el.gujarati, nota: n, ok: n >= 7 });
    }
  });

  if(!todos || notas.length === 0){
    alert('Graba y evalúa todos los elementos antes de verificar.');
    return;
  }

  var promedio = notas.reduce(function(a,b){ return a+b; }, 0) / notas.length;
  var pct = Math.round(promedio * 10);

  mostrarResultado(pct, detalle);
}

/* ── Resultado ── */
function mostrarResultado(pct, detalle){
  var ev = evalMsg(pct);
  sfx.src = ev.snd; sfx.play().catch(function(){});
  document.getElementById('top-fill').style.width = '100%';

  document.getElementById('res-emoji').textContent = ev.emoji;
  document.getElementById('res-msg').textContent   = ev.msg;
  document.getElementById('res-pct').textContent   = 'Resultado: ' + pct + '%';

  var html = '';
  detalle.forEach(function(d){
    html += '<div class="detalle-fila">' +
      '<span class="df-gu">' + d.gu + '</span>' +
      '<span class="' + (d.ok ? 'df-ok' : 'df-err') + '">⭐ ' + d.nota + '/10</span>' +
      '</div>';
  });
  document.getElementById('res-detalle').innerHTML = html;

  // Mostrar "Siguiente sesión" solo si hay más
  var haySiguiente = (sesionIdx + 1) < sesiones.length;
  document.getElementById('btn-siguiente').style.display = haySiguiente ? 'block' : 'none';

  goTo('s-resultado');
}

function repetirDesdeResultado(){
  montarSesion();
}

/* ── Init ── */
if(!JSON_URL){
  document.querySelector('.wrap').innerHTML =
    '<p style="text-align:center;color:var(--ink-soft);padding:40px 20px;">Falta el parámetro <strong>?json=</strong> en la URL.</p>';
} else {
  fetch(JSON_URL)
    .then(function(r){ if(!r.ok) throw new Error('404'); return r.json(); })
    .then(function(data){
      DATA     = data;
      sesiones = data.sesiones || [];
      if(sesiones.length === 0) throw new Error('Sin sesiones');
      montarIntro();
    })
    .catch(function(){
      document.querySelector('.wrap').innerHTML =
        '<p style="text-align:center;color:var(--ink-soft);padding:40px 20px;">No se pudo cargar el contenido. Revisa tu conexión.</p>';
    });
}
</script>

<script>
(function() {
  var VERSION_URL = 'https://rubenbhai.github.io/GujaratiResources/version.txt';
  fetch(VERSION_URL + '?t=' + Date.now(), { cache: 'no-store' })
    .then(function(r) { return r.text(); })
    .then(function(serverV) {
      serverV = serverV.trim();
      var localV = null;
      try { localV = localStorage.getItem('appVersion'); } catch(e) {}
      if (localV === null) {
        try { localStorage.setItem('appVersion', serverV); } catch(e) {}
      } else if (localV !== serverV) {
        try { localStorage.setItem('appVersion', serverV); } catch(e) {}
        location.reload(true);
      }
    })
    .catch(function() {});
})();
</script>
</body>
</html>
