<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>A practicar · Piensa en Gujarati</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Noto+Serif+Gujarati:wght@400;600;700&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="tema-reto-flash.css">
</head>
<body>

<nav class="nav-bar">
  <button class="nav-btn" onclick="history.back()">← Volver</button>
  <a class="nav-btn home" href="index.html">🏠</a>
  <span class="nav-btn" style="opacity:0;pointer-events:none;">&nbsp;</span>
</nav>
<div class="top-progress"><div class="top-progress-fill" id="top-fill"></div></div>

<div class="wrap">

  <!-- INTRO -->
  <div class="screen active" id="s-intro">
    <span class="badge">🎯 A reconocer</span>
    <h1 id="intro-titulo">¡A reconocer y emparejar!</h1>
    <p class="lead" id="intro-desc"></p>
    <button class="btn-main" onclick="iniciarFaseB()">¡Empezar! →</button>
    <button class="btn-sec" onclick="history.back()">Ahora no</button>
  </div>

  <!-- FASE B: RECONOCIMIENTO -->
  <div class="screen" id="screen-b">
    <span class="badge">A reconocer</span>
    <h2>Lee antes que se revele</h2>
    <p class="subtitle">Tienes 2 segundos</p>
    <div style="display:flex; align-items:center; justify-content:space-between; width:100%; max-width:320px; gap:8px;">
      <div class="game-progress" id="b-progress">1 de 10</div>
      <div class="game-answer" id="b-answer" style="flex:1; text-align:center;"></div>
    </div>
    <div class="game-card" id="b-card" onclick="bNext()" style="cursor:pointer; margin:0 auto;">&#2724;</div>
    <div class="timer-wrap" style="margin:0 auto;"><div class="timer-bar" id="b-timer"></div></div>
    <div style="display:flex; gap:10px; width:100%; max-width:320px; margin:0 auto;">
      <button class="btn-main" id="btn-b-prev" onclick="bPrev()" style="flex:1; background:var(--surface); box-shadow:0 4px 14px rgba(0,0,0,0.15); border:1px solid var(--border); padding:14px; border-radius:50px; font-weight:700; font-size:1rem; color:var(--ink-soft); cursor:pointer; font-family:inherit; opacity:0.4; pointer-events:none;">← Anterior</button>
      <button class="btn-main" id="btn-b-next" onclick="bNext()" style="flex:1; background:var(--verde); box-shadow:0 4px 14px rgba(74,107,83,0.3); border:none; padding:14px; border-radius:50px; font-weight:700; font-size:1rem; color:white; cursor:pointer; font-family:inherit;">Siguiente →</button>
    </div>
    <button class="btn-sec" id="btn-saltar-b" style="max-width:320px; width:100%; margin:0 auto;" onclick="terminarFaseB()"></button>
  </div>

  <!-- FASE C: EMPAREJAMIENTO -->
  <div class="screen" id="screen-c">
    <div style="display:flex; align-items:center; justify-content:space-between; width:100%; gap:10px;">
      <span class="badge">A emparejar</span>
      <div class="match-score">Correctas: <span id="c-score">0</span> / <span id="c-total">10</span></div>
    </div>
    <h2>Toca la letra que escuchas</h2>
    <div class="match-letters" id="match-letters-container"></div>
    <p class="match-prompt" id="c-prompt">&nbsp;</p>
    <div style="display:flex; gap:10px; width:100%;">
      <button class="btn-main" id="btn-c-replay" onclick="matchReplay()" style="flex:1;">▶ Repetir</button>
      <button class="btn-main" onclick="goTo('screen-b')" style="flex:1; background:var(--surface); color:var(--ink-soft); box-shadow:0 4px 14px rgba(0,0,0,0.15); border:1px solid var(--border);">← Volver</button>
    </div>
    <button class="btn-sec" onclick="mostrarResultadoFinal()">Saltar al final →</button>
  </div>

  <!-- RESULTADO -->
  <div class="screen" id="s-resultado">
    <div class="resultado-card">
      <div class="resultado-emoji" id="res-emoji"></div>
      <div class="resultado-msg"   id="res-msg"></div>
      <div class="resultado-pct"   id="res-pct"></div>
    </div>
    <button class="btn-main" onclick="history.back()" style="background:var(--sindoor);">✓ Continuar lección</button>
    <button class="btn-sec" onclick="reiniciarTodo()">🔄 Repetir</button>
  </div>

</div>

<audio id="player"></audio>
<audio id="sfx"></audio>

<script>
const player = document.getElementById('player');
const sfx    = document.getElementById('sfx');
const SND_OK  = 'https://rubenbhai.github.io/GujaratiResources/audios/clase_1_1/Clase_1_1_Correcto.mp3';
const SND_ERR = 'https://rubenbhai.github.io/GujaratiResources/audios/clase_1_1/Clase_1_1_Incorrecto.mp3';

// Leer parámetro ?json=nombre (sin extensión) desde la URL — igual que antes
const _params  = new URLSearchParams(location.search);
const _jsonKey = _params.get('json') || '';   // ej: "Leccion_1_1_1_c3"

const _matchLeccion = _jsonKey.match(/Leccion_(\d+_\d+_\d+)/);
const _folderLeccion = _matchLeccion ? _matchLeccion[1] : '';

const JSON_URL = _jsonKey && _folderLeccion
  ? 'data/' + _folderLeccion + '/reto_flash_' + _jsonKey + '.json'
  : (_jsonKey ? 'data/reto_flash_' + _jsonKey + '.json' : '');

let letters = [];
let extras  = [];
let LetrasYFrases = [];
let hayFaseC = false;
let B_TOTAL = 10;
let C_ROUNDS = 10;

function shuffle(a) { return a.slice().sort(function() { return Math.random() - 0.5; }); }

function htmlConSignificado(item, sigRem) {
  var sig = item.significado
    ? '<div style="font-size:' + sigRem + 'rem; color:var(--saffron); font-weight:800; margin-top:6px; line-height:1.15; font-family:\'Source Sans 3\',sans-serif;">' + item.significado + '</div>'
    : '';
  return '<div style="display:flex; flex-direction:column; align-items:center; justify-content:center; line-height:1;">'
       + '<div>' + item.letter + '</div>' + sig + '</div>';
}

function indicesAleatorios(cantidad) {
  var MAX_INTENTOS = 12;
  var total = LetrasYFrases.length;
  var out = [];
  for (var i = 0; i < cantidad; i++) {
    var idx = Math.floor(Math.random() * total);
    var intentos = 0;
    while (out.length > 0 && idx === out[out.length - 1] && intentos < MAX_INTENTOS) {
      idx = Math.floor(Math.random() * total);
      intentos++;
    }
    out.push(idx);
  }
  return out;
}

function goTo(id) {
  var screens = document.querySelectorAll('.screen');
  for (var i = 0; i < screens.length; i++) screens[i].classList.remove('active');
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

/* ===== INTRO ===== */
function montarIntro() {
  var n = LetrasYFrases.length;
  document.getElementById('intro-desc').textContent =
    n + (n === 1 ? ' símbolo para practicar.' : ' símbolos para practicar.');
}

function iniciarFaseB() {
  goTo('screen-b');
  initB();
}

/* ===== FASE B ===== */
var bIdx = 0, bQueue = [], bTimer = null;
var bCardBaseFont = null;
var audiosB = [];

function initB() {
  bIdx = 0;
  var idx = indicesAleatorios(B_TOTAL);
  bQueue  = idx.map(function(i){ return LetrasYFrases[i]; });
  audiosB = bQueue.map(function(o){ return o.audio; });
  document.getElementById('btn-saltar-b').textContent = hayFaseC ? '¡Vamos a emparejar! →' : 'Terminar →';
  bShowCard();
}

function bShowCard() {
  if (bTimer) clearTimeout(bTimer);
  var item = bQueue[bIdx];
  document.getElementById('b-progress').textContent = (bIdx + 1) + ' de ' + B_TOTAL;
  var card = document.getElementById('b-card');
  var ans  = document.getElementById('b-answer');
  var bar  = document.getElementById('b-timer');
  card.innerHTML = htmlConSignificado(item, 1.8);
  if (bCardBaseFont === null) bCardBaseFont = parseFloat(getComputedStyle(card).fontSize);
  card.style.fontSize = (item.letter.length >= 4 ? bCardBaseFont * 0.6 : bCardBaseFont) + 'px';
  card.classList.remove('reveal');
  ans.textContent = ''; ans.classList.remove('visible');
  var prev = document.getElementById('btn-b-prev');
  if (bIdx === 0) { prev.style.opacity = '0.4'; prev.style.pointerEvents = 'none'; }
  else { prev.style.opacity = '1'; prev.style.pointerEvents = 'auto'; }
  bar.style.transition = 'none'; bar.style.transform = 'scaleX(1)';
  requestAnimationFrame(function() { requestAnimationFrame(function() {
    bar.style.transition = 'transform 2s linear'; bar.style.transform = 'scaleX(0)';
  }); });
  bTimer = setTimeout(function() { bReveal(item); }, 2000);
}

function bReveal(item) {
  document.getElementById('b-card').classList.add('reveal');
  var ans = document.getElementById('b-answer');
  ans.textContent = item.answer; ans.classList.add('visible');
  player.src = audiosB[bIdx]; player.playbackRate = 1.0; player.play().catch(function(){});
}

function bPrev() {
  player.pause(); player.currentTime = 0;
  if (bIdx > 0) { bIdx--; bShowCard(); }
}

function bNext() {
  player.pause(); player.currentTime = 0;
  bIdx++;
  if (bIdx < B_TOTAL) { bShowCard(); }
  else { terminarFaseB(); }
}

function terminarFaseB() {
  if (bTimer) clearTimeout(bTimer);
  player.pause();
  if (hayFaseC) { goTo('screen-c'); initC(); }
  else { mostrarResultadoFinal(); }
}

/* ===== FASE C ===== */
var cIdx = 0, cScore = 0;
var cCurrentItem = null, cLayout = [], cLocked = false;
var cBtnBaseFont = null;
var audiosC = [];

function initC() {
  var idx  = indicesAleatorios(C_ROUNDS);
  var cQueue = idx.map(function(i){ return LetrasYFrases[i]; });
  audiosC = cQueue.map(function(o){ return o.audio; });
  window._cQueue = cQueue; // guardado para cShowRound
  cIdx = 0; cScore = 0; cLocked = false;
  document.getElementById('c-score').textContent = '0';
  document.getElementById('c-total').textContent = C_ROUNDS;
  cShowRound();
}

function cShowRound() {
  if (cIdx >= C_ROUNDS) { mostrarResultadoFinal(); return; }
  cLocked = false;
  cCurrentItem = window._cQueue[cIdx];

  // Mínimo 2 botones (1 correcta + al menos 1 distractor), máximo 4 — según cuántos
  // símbolos distintos haya disponibles en el pool de esta sesión.
  var numBotones = Math.min(4, LetrasYFrases.length);
  var distractores = shuffle(LetrasYFrases.filter(function(l){ return l.letter !== cCurrentItem.letter; })).slice(0, numBotones - 1);
  var pool = shuffle(distractores.concat([cCurrentItem]));
  cLayout = pool.map(function(l){ return LetrasYFrases.indexOf(l); });

  var cont = document.getElementById('match-letters-container');
  cont.innerHTML = '';
  for (var i = 0; i < pool.length; i++) {
    var btn = document.createElement('button');
    btn.className = 'match-btn';
    btn.id = 'mb-' + i;
    if (cBtnBaseFont === null) cBtnBaseFont = 5; // rem aproximado base, clamp ya lo ajusta
    btn.style.fontSize = (pool[i].letter.length >= 4 ? '3rem' : '');
    btn.innerHTML = htmlConSignificado(pool[i], 1.2);
    btn.onclick = (function(idx){ return function(){ matchTap(idx); }; })(i);
    cont.appendChild(btn);
  }
  document.getElementById('c-prompt').innerHTML = '&nbsp;';
  setTimeout(function() { player.src = audiosC[cIdx]; player.play().catch(function(){}); }, 300);
}

function matchReplay() {
  player.src = audiosC[cIdx]; player.play().catch(function(){});
}

function matchTap(btnIdx) {
  if (cLocked) return;
  var tapped = LetrasYFrases[cLayout[btnIdx]]; if (!tapped) return;
  var correct = tapped.letter === cCurrentItem.letter;
  var btn = document.getElementById('mb-' + btnIdx);

  if (correct) {
    cLocked = true;
    btn.classList.add('correct');
    cScore++;
    document.getElementById('c-score').textContent = cScore;
    document.getElementById('c-prompt').innerHTML = '✔ ¡Correcto! — <strong>' + cCurrentItem.answer + '</strong>';
    sfx.src = SND_OK; sfx.play().catch(function(){});
    cIdx++;
    setTimeout(function() { cShowRound(); }, 1200);
  } else {
    btn.classList.add('wrong');
    document.getElementById('c-prompt').innerHTML = '✖ ¡Inténtalo de nuevo!';
    sfx.src = SND_ERR; sfx.play().catch(function(){});
    setTimeout(function() {
      btn.classList.remove('wrong');
      player.src = audiosC[cIdx]; player.play().catch(function(){});
    }, 1000);
  }
}

/* ===== RESULTADO ===== */
function evalMsgJuego(pct) {
  if (pct >= 91) return { emoji: '🏆', msg: '¡Felicidades!' };
  if (pct >= 81) return { emoji: '⭐', msg: 'Muy bien' };
  if (pct >= 71) return { emoji: '👍', msg: 'Ya casi lo logras' };
  if (pct >= 61) return { emoji: '💪', msg: 'Vas bien...' };
  return { emoji: '🔄', msg: 'Sigue practicando' };
}

function mostrarResultadoFinal() {
  document.getElementById('top-fill').style.width = '100%';
  if (hayFaseC) {
    var pct = Math.round((cScore / C_ROUNDS) * 100);
    var ev = evalMsgJuego(pct);
    document.getElementById('res-emoji').textContent = ev.emoji;
    document.getElementById('res-msg').textContent   = ev.msg;
    document.getElementById('res-pct').textContent   = 'Correctas: ' + cScore + ' / ' + C_ROUNDS + ' (' + pct + '%)';
  } else {
    document.getElementById('res-emoji').textContent = '🎉';
    document.getElementById('res-msg').textContent   = '¡Bien hecho!';
    document.getElementById('res-pct').textContent   = '';
  }
  goTo('s-resultado');
}

function reiniciarTodo() {
  document.getElementById('top-fill').style.width = '0%';
  goTo('s-intro');
}

/* ===== ARRANQUE ===== */
if (!JSON_URL) {
  document.querySelector('.wrap').innerHTML =
    '<p style="text-align:center;color:var(--ink-soft);padding:40px 20px;">Falta el parámetro <strong>?json=</strong> en la URL.</p>';
} else {
  fetch(JSON_URL + '?t=' + Date.now(), { cache: 'no-store' })
    .then(function(r){ if (!r.ok) throw new Error('404'); return r.json(); })
    .then(function(data){
      letters = data.letters || [];
      extras  = data.extras  || [];
      LetrasYFrases = letters.concat(extras);
      hayFaseC = LetrasYFrases.length >= 2;
      B_TOTAL  = LetrasYFrases.length * 2;
      C_ROUNDS = LetrasYFrases.length * 2;
      montarIntro();
    })
    .catch(function(){
      document.querySelector('.wrap').innerHTML =
        '<p style="text-align:center;color:var(--ink-soft);padding:40px 20px;">No se pudo cargar el contenido. Revisa tu conexión.</p>';
    });
}
</script>

<script>
(function() {
  var VERSION_URL = 'https://rubenbhai.github.io/GujaratiResources/version.txt';
  fetch(VERSION_URL + '?t=' + Date.now(), { cache: 'no-store' })
    .then(function(r) { return r.text(); })
    .then(function(serverV) {
      serverV = serverV.trim();
      var localV = null;
      try { localV = localStorage.getItem('appVersion'); } catch(e) {}
      if (localV === null) {
        try { localStorage.setItem('appVersion', serverV); } catch(e) {}
      } else if (localV !== serverV) {
        try { localStorage.setItem('appVersion', serverV); } catch(e) {}
        location.reload(true);
      }
    })
    .catch(function() {});
})();
</script>
</body>
</html>
