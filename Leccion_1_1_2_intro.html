<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lección 1.1.2 — En construcción · Piensa en Gujarati</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600&family=Outfit:wght@300;400;600&family=Noto+Serif+Gujarati:wght@400;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --gold: #C8973A; --teal: #2ABFB0; --ink: #0D1420; --ink-soft: #1E2A3A;
  --paper: #EAE0CC; --paper-warm: #F5EDD8; --border-gold: rgba(200,151,58,0.3);
}
body { background: var(--ink); color: var(--paper); font-family: 'Outfit', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 24px; text-align: center; }
.icon { font-size: 4rem; margin-bottom: 24px; animation: spin 8s linear infinite; }
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
.gu { font-family: 'Noto Serif Gujarati', serif; font-size: 2rem; color: var(--gold); margin-bottom: 8px; }
h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(1.6rem, 4vw, 2.4rem); font-weight: 600; color: var(--paper-warm); margin-bottom: 16px; }
p { font-size: 1rem; font-weight: 300; color: rgba(234,224,204,0.6); line-height: 1.7; max-width: 480px; margin-bottom: 40px; }
.chips { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 48px; }
.chip { background: rgba(200,151,58,0.08); border: 1px solid var(--border-gold); border-radius: 20px; padding: 6px 16px; font-size: 0.85rem; font-family: 'Noto Serif Gujarati', serif; color: var(--gold); }
.btn-back { background: transparent; border: 1px solid rgba(42,191,176,0.35); color: var(--teal); padding: 12px 28px; border-radius: 8px; font-size: 0.9rem; text-decoration: none; transition: all 0.2s; }
.btn-back:hover { background: rgba(42,191,176,0.08); }
</style>
</head>
<body>
<div class="icon">&#9881;</div>
<div class="gu">ટ થ ન વ બ ધ</div>
<h1>Lección 1.1.2 — En construcción</h1>
<p>Esta lección está siendo preparada. Pronto aprenderás las siguientes consonantes y vocales del gujarati, incluyendo los saludos básicos.</p>
<div class="chips">
  <span class="chip">ટ</span>
  <span class="chip">થ</span>
  <span class="chip">ન</span>
  <span class="chip">વ</span>
  <span class="chip">બ</span>
  <span class="chip">ધ</span>
  <span class="chip">અ</span>
  <span class="chip">ઓ</span>
  <span class="chip">ઉ</span>
  <span class="chip">ો</span>
  <span class="chip">ુ</span>
</div>
<a href="Contenido.html" class="btn-back">&larr; Volver al contenido</a>
</body>
</html>
