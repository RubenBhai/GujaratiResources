<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Video · Piensa en Gujarati</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Noto+Serif+Gujarati:wght@400;600;700&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="tema-video.css">
</head>
<body>

<nav class="nav-bar">
  <button class="nav-btn" onclick="audio.pause(); audio.src=''; cancelAnimationFrame(rafId); history.back();">&larr; Lecci&oacute;n</button>
  <span class="nav-btn" style="opacity:0;pointer-events:none;">&nbsp;</span>
  <span class="nav-btn" style="opacity:0;pointer-events:none;">&nbsp;</span>
</nav>

<div class="wrap">
  <span class="badge" id="badge">Antes de empezar</span>
  <h1 id="titulo">Escucha esta conversación</h1>
  <p class="lead" id="intro"></p>

  <div class="progress"><div class="progress-fill" id="progress-fill"></div></div>

  <div style="display: flex; gap: 16px; align-items: center; justify-content: center; flex-wrap: wrap; width: 100%;">
    <div class="controls" style="width: auto; display: flex; gap: 8px;">
      <button class="btn-play" id="btn-play" onclick="reproducir()">▶ Reproducir</button>
      
      <button class="btn-replay" id="btn-pause" onclick="togglePausa()" style="display:none; padding: 10px 16px;">⏸</button>
    </div>

    <div class="lang-row">
      <button class="lang-btn" id="lang-esp" onclick="setIdioma('esp')">ESP</button>
      <button class="lang-btn" id="lang-guj" onclick="setIdioma('guj')">GUJ</button>
      <button class="lang-btn active" id="lang-ambos" onclick="setIdioma('ambos')">ESP / GUJ</button>
    </div>
  </div>

  <div class="escena" id="escena"></div>

  <a class="btn-fin" id="btn-empezar" href="#">Empezar la clase →</a>
</div>

<audio id="audio"></audio>

<script>
// ── Parámetros de URL ──
const _params  = new URLSearchParams(location.search);
const _leccion = (_params.get('leccion') || '1.1.1').replace(/\./g, '_');
const JSON_URL = 'data/' + _leccion + '/video_clase_' + _leccion + '.json';
const _nextParam = _params.get('next');
const _modo = _params.get('modo');   // 'desafio' = repaso antes del video interactivo

const audio  = document.getElementById('audio');
const escena = document.getElementById('escena');
const fill   = document.getElementById('progress-fill');

let DATA = null;
let DIALOGOS = [];
let SECUENCIAS = [];
let AVATARES = {};
let NEXT_PAGE = null;

let burbujas = [];
let mostradas = [];
let dialogoSecuencia = [];   
let burbujaDeDialogo = [];   // burbuja física por cada diálogo
let secuenciaActual = -1;
let rafId = null;

var imagenesCacheadas = []; 

/* ── Precargar TODAS las imágenes de la escena (fondos + avatares) antes de arrancar ── */
function precargarImagenes(){
  var urls = [];

  SECUENCIAS.forEach(function(sec){
    if (sec.imagenFondo) urls.push(sec.imagenFondo);
  });
  DIALOGOS.forEach(function(d){
    if (d.imagenFondo) urls.push(d.imagenFondo);
  });
  Object.keys(AVATARES).forEach(function(key){
    if (AVATARES[key].imagen) urls.push(AVATARES[key].imagen);
  });

  urls = urls.filter(function(u, i){ return urls.indexOf(u) === i; }); // sin duplicados

  var promesas = urls.map(function(url){
    return new Promise(function(resolve){
      var img = new Image();
      img.onload = resolve;
      img.onerror = resolve; // una imagen rota no debe colgar el resto
      img.src = url;
      imagenesCacheadas.push(img);
    });
  });

  // Salvavidas: no esperar más de 8s aunque algo se cuelgue en la red
  var limite = new Promise(function(resolve){ setTimeout(resolve, 8000); });
  return Promise.race([ Promise.all(promesas), limite ]);
}

/* ── Construir la escena ── */
function construirEscena(){
  escena.innerHTML = '';
  
  // 1. Crear y añadir la capa de fondo
  var bgDiv = document.createElement('div');
  bgDiv.id = 'bg-escena';
  bgDiv.className = 'bg-escena';
  escena.appendChild(bgDiv);

  burbujas = [];
  burbujaDeDialogo = [];   // burbuja física (índice) que le toca a cada diálogo
  mostradas = DIALOGOS.map(()=>false);

  var claveAIndice = {};   // clave de burbuja -> índice en burbujas[]

  DIALOGOS.forEach(function(d, i){
    // clave de agrupación: si trae "burbuja" la comparte; si no, es única por id
    var clave = (d.burbuja !== undefined && d.burbuja !== null) ? ('g'+d.burbuja) : ('d'+d.id);

    if(claveAIndice[clave] === undefined){
      // crear nueva burbuja física, usando los datos del PRIMER diálogo del grupo
      var av = AVATARES[d.avatar] || {};
      var color = av.color || '#5F6E4F';
      var img = av.imagen || '';
      var b = document.createElement('div');
      b.className = 'burbuja ' + (d.lado || 'izq');
      b.id = 'burbuja-'+burbujas.length;
      b.innerHTML =
        '<div class="avatar" style="background-image:url(\''+img+'\'); background-color:'+color+';"></div>'+
        '<div class="caja" style="background:'+color+';">'+
          '<div class="gu-texto">'+(d.gujarati||'')+'</div>'+
          '<div class="es-texto">'+(d.espanol||'')+'</div>'+
        '</div>';
      escena.appendChild(b);
      claveAIndice[clave] = burbujas.length;
      burbujas.push(b);
    }
    burbujaDeDialogo[i] = claveAIndice[clave];
  });

  secuenciaActual = -1;
  ajustarAltura(burbujasEnSecuencia(0));
}

/* ── Cuántas burbujas FÍSICAS hay en una secuencia (para la altura) ── */
function burbujasEnSecuencia(sidx){
  if(!SECUENCIAS.length) return 1;
  var vistos = {};
  SECUENCIAS[sidx].dialogos.forEach(function(id){
    var i = DIALOGOS.findIndex(function(x){ return x.id === id; });
    if(i >= 0) vistos[ burbujaDeDialogo[i] ] = true;
  });
  return Object.keys(vistos).length || 1;
}

/* ── Mapear cada diálogo (índice) a su secuencia ── */
function mapearSecuencias(){
  dialogoSecuencia = DIALOGOS.map(()=>0);
  SECUENCIAS.forEach(function(sec, sidx){
    sec.dialogos.forEach(function(id){
      var idx = DIALOGOS.findIndex(function(d){ return d.id === id; });
      if(idx >= 0) dialogoSecuencia[idx] = sidx;
    });
  });
}

/* ── Altura del frame = matemáticas exactas ── */
function ajustarAltura(numDialogos){
  // 1. Sumamos el nuevo padding de la .escena (14px arriba + 14px abajo = 28px)
  var paddingTotal = 28; 
  // 2. Sumamos los nuevos espacios entre burbujas (10px de gap)
  var gapTotal = (numDialogos > 1) ? (numDialogos - 1) * 10 : 0; 
  // 3. Bajamos la constante a 110px (40px del avatar + el alto promedio del texto compacto)
  var alturaReal = paddingTotal + gapTotal + (110 * numDialogos);
  
  escena.style.height = alturaReal + 'px';
}

/* ── Idioma ── */
function setIdioma(modo){
  escena.classList.remove('solo-esp','solo-guj');
  if(modo==='esp')  escena.classList.add('solo-esp');
  if(modo==='guj')  escena.classList.add('solo-guj');
  document.getElementById('lang-esp').classList.toggle('active', modo==='esp');
  document.getElementById('lang-guj').classList.toggle('active', modo==='guj');
  document.getElementById('lang-ambos').classList.toggle('active', modo==='ambos');
}

/* ── Reproducir / Pausar ── */
function reproducir(){

  document.body.classList.add('video-iniciado');
  document.getElementById('btn-empezar').textContent = 'Empezar →';

  // Si ya hay burbujas mostradas (el usuario repite), reiniciamos la escena
  if (mostradas.some(function(m) { return m; })) {
    fill.style.width = '0%';
    construirEscena();
  }

  audio.src = DATA.audio;
  audio.currentTime = 0;
  audio.play().catch(function(){
    alert('No se pudo reproducir el audio. Verifica tu conexión.');
  });
  
  // Deshabilitar botón Reproducir
  document.getElementById('btn-play').disabled = true;
  
  // Mostrar botón Pausa
  var btnP = document.getElementById('btn-pause');
  btnP.textContent = '⏸';
  btnP.style.display = 'inline-block';
  
  seguir();
}

function togglePausa(){
  var btnP = document.getElementById('btn-pause');
  if (audio.paused) {
    audio.play();
    btnP.textContent = '⏸';
    seguir(); 
  } else {
    audio.pause();
    btnP.textContent = '▶';
    cancelAnimationFrame(rafId); 
  }
}

function seguir(){
  cancelAnimationFrame(rafId);
  function loop(){
    var t = audio.currentTime;
    var dur = audio.duration || (DIALOGOS.length ? DIALOGOS[DIALOGOS.length-1].fin : 20);
    fill.style.width = Math.min(100, (t/dur)*100) + '%';

    DIALOGOS.forEach(function(d, i){
      var bIdx = burbujaDeDialogo[i];

      if(t >= d.ini && !mostradas[i]){
        var sidx = dialogoSecuencia[i];

        if(sidx !== secuenciaActual){
          secuenciaActual = sidx;

	  // Cambiar imagen de fondo solo si la secuencia la define; si no, mantener el actual
          if(SECUENCIAS[sidx].imagenFondo){
            document.getElementById('bg-escena').style.backgroundImage = "url('" + SECUENCIAS[sidx].imagenFondo + "')";
          }

          // Ocultar las burbujas que NO pertenecen a esta secuencia
          DIALOGOS.forEach(function(dd, jj){
            if(dialogoSecuencia[jj] !== sidx){
              burbujas[ burbujaDeDialogo[jj] ].classList.add('saliente');
              burbujas[ burbujaDeDialogo[jj] ].classList.remove('visible');
            }
          });
          ajustarAltura(burbujasEnSecuencia(sidx));
        }

        // Marcar este diálogo como mostrado
        mostradas[i] = true;

        // Escribir SU texto en SU burbuja física (reemplaza lo que hubiera)
        var caja = burbujas[bIdx];
        caja.classList.add('visible');
        caja.classList.remove('saliente');
        // Si el avatar/color cambia entre diálogos del mismo grupo, actualizarlos
        var av = AVATARES[d.avatar] || {};
        var color = av.color || '#5F6E4F';
        var img = av.imagen || '';
        caja.className = 'burbuja ' + (d.lado || 'izq') + ' visible';
        caja.querySelector('.avatar').style.backgroundImage = "url('" + img + "')";
        caja.querySelector('.avatar').style.backgroundColor = color;
        caja.querySelector('.caja').style.background = color;
        caja.querySelector('.gu-texto').textContent = d.gujarati || '';
        caja.querySelector('.es-texto').textContent = d.espanol || '';

        // Fondo por diálogo (tiene prioridad sobre el de la secuencia)
        if(d.imagenFondo){
          document.getElementById('bg-escena').style.backgroundImage = "url('" + d.imagenFondo + "')";
        }
      }

      var activa = (t >= d.ini && t <= d.fin);
      if(bIdx !== undefined) burbujas[bIdx].classList.toggle('activa', activa);
    });

    if(!audio.paused && !audio.ended){
      rafId = requestAnimationFrame(loop);
    }
  }
  rafId = requestAnimationFrame(loop);
}

audio.addEventListener('ended', function(){
  fill.style.width = '100%';
  burbujas.forEach(function(b){ b.classList.remove('activa'); });
  // btn-empezar siempre activo — no necesita agregarse clase
  
  // Ocultar pausa y habilitar reproducir
  document.getElementById('btn-pause').style.display = 'none';
  document.getElementById('btn-play').disabled = false;
});

/* ── Configurar el botón inferior ── */
function configurarBotonFin(){
  var btn = document.getElementById('btn-empezar');

  // Función que detiene el audio antes de navegar
  function irADestino(destino){
    cancelAnimationFrame(rafId);
    audio.pause();
    audio.src = '';
    if(destino) window.location.href = destino;
    else history.back();
  }

  // MODO DESAFÍO
  if(_modo === 'desafio'){
    var lecParam = _params.get('leccion') || '1.1.1';
    NEXT_PAGE = (_nextParam || 'video_interactivo.html') + '?leccion=' + lecParam;
    btn.textContent = '¡Quiero participar! →';
    btn.href = 'javascript:void(0)';
    btn.onclick = function(){ irADestino(NEXT_PAGE); };
    return;
  }

  NEXT_PAGE = _nextParam || DATA.next || null;
  if(NEXT_PAGE){
    btn.textContent = 'Empezar la clase →';
    btn.href = 'javascript:void(0)';
    btn.onclick = function(){ irADestino(NEXT_PAGE); };
  } else {
    btn.textContent = 'De regreso a la clase';
    btn.href = 'javascript:void(0)';
    btn.onclick = function(){
      if(DATA.subtitulo_fin) document.getElementById('badge').textContent = DATA.subtitulo_fin;
      if(DATA.intro_fin)     document.getElementById('intro').textContent = DATA.intro_fin;
      irADestino(null);
    };
  }
}

/* ── Init ── */
fetch(JSON_URL)
  .then(function(r){ if(!r.ok) throw new Error('404'); return r.json(); })
  .then(function(data){
    DATA = data;
    DIALOGOS = data.dialogos || [];
    SECUENCIAS = data.secuencias && data.secuencias.length
                 ? data.secuencias
                 : DIALOGOS.map(function(d){ return { dialogos:[d.id] }; });
    AVATARES = data.avatares || {};
    
    if(_modo === 'desafio'){
      // Textos del desafío final (con respaldo a los normales si faltan)
      document.getElementById('badge').textContent  = data.subtitulo_desafio || data.subtitulo || '';
      document.getElementById('titulo').textContent = data.titulo_desafio    || data.titulo    || '';
      document.getElementById('intro').textContent  = data.intro_desafio     || data.intro     || '';
    } else {
      if(data.subtitulo) document.getElementById('badge').textContent = data.subtitulo;
      if(data.titulo)    document.getElementById('titulo').textContent = data.titulo;
      if(data.intro)     document.getElementById('intro').textContent = data.intro;
    }

    mapearSecuencias();
    construirEscena();
    configurarBotonFin();

    // No dejar arrancar el diálogo hasta tener fondos y avatares listos
    var btnPlay = document.getElementById('btn-play');
    var textoPlayOriginal = btnPlay.textContent;
    btnPlay.disabled = true;
    btnPlay.textContent = 'Cargando…';
    precargarImagenes().then(function(){
      btnPlay.disabled = false;
      btnPlay.textContent = textoPlayOriginal;
    });

  })
  .catch(function(){
    document.querySelector('.wrap').innerHTML =
      '<p style="text-align:center;color:var(--ink-soft);padding:40px 20px;">No se pudo cargar el contenido. Revisa tu conexión.</p>';
  });
</script>

<script>
(function() {
  var VERSION_URL = 'https://rubenbhai.github.io/GujaratiResources/version.txt';
  fetch(VERSION_URL + '?t=' + Date.now(), { cache: 'no-store' })
    .then(function(r) { return r.text(); })
    .then(function(serverV) {
      serverV = serverV.trim();
      var localV = null;
      try { localV = localStorage.getItem('appVersion'); } catch(e) {}
      if (localV === null) {
        try { localStorage.setItem('appVersion', serverV); } catch(e) {}
      } else if (localV !== serverV) {
        try { localStorage.setItem('appVersion', serverV); } catch(e) {}
        location.reload(true);
      }
    })
    .catch(function() {});
})();
</script>
</body>
</html>
