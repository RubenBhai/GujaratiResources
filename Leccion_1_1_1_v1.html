<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>તરત — enseguida · Piensa en Gujarati</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Noto+Serif+Gujarati:wght@400;700&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="tema-amigable_4.css">
</head>
<body>

<nav class="nav-bar">
  <a class="nav-btn" href="Leccion_1_1_1_v_intro.html">← Anterior</a>
  <a class="nav-btn home" href="Leccion_1_1_1_intro.html">🏠</a>
  <a class="nav-btn" href="Leccion_1_1_1_v2.html">Siguiente →</a>
</nav>

<div class="wrap">
  <span class="badge">Vocabulario 1 de 6</span>

  <div class="frame-vocab-img">
    <div class="frame-vocab-header">
      <span class="frame-vocab-word">તરત</span>
      <span class="frame-vocab-meaning">enseguida</span>
    </div>
    <img src="https://rubenbhai.github.io/GujaratiResources/imagenes/Clase_1_1/img_1.1.1.1_tarat.png" alt="તરત" onerror="this.style.display='none'" onclick="window.location.href='Leccion_1_1_1_v2.html'" style="cursor:pointer">
  </div>

  <div class="frame-vocab-audio">
    <div class="frame-vocab-audio-top">
      <div class="frame-vocab-pron">💡 ત-ર-ત → ta-<strong>rat</strong></div>
      <button class="btn-play" onclick="playVocab(this, 'https://rubenbhai.github.io/GujaratiResources/audios/clase_1_1/Clase_1.1.1.1_h_tarat.mp3', 'https://rubenbhai.github.io/GujaratiResources/audios/clase_1_1/Clase_1.1.1.1_m_tarat.mp3')">▶</button>
    </div>
    <div class="frame-vocab-audio-bottom">
      <button class="btn-speed active" id="btn-normal" onclick="setSpeed(1.0)">▶ Normal</button>
      <button class="btn-speed" id="btn-slow" onclick="setSpeed(0.75)">🐢 Lento</button>
    </div>
  </div>

  <div class="botones-inferiores">
    <a class="btn-main" href="https://rubenbhai.github.io/GujaratiResources/practica.html?modulo=1.1&leccion=1">🎯 Practicar pronunciación</a>
    <a class="btn-sec" href="Leccion_1_1_2_intro.html">⏭️ Siguiente lección</a>
  </div>
</div>

<audio id="player"></audio>

<script>
  const player = document.getElementById('player');
  let currentSpeed = 1.0;
  let toggle = 'h';

  function setSpeed(s) {
    currentSpeed = s;
    document.getElementById('btn-normal').classList.toggle('active', s === 1.0);
    document.getElementById('btn-slow').classList.toggle('active', s === 0.75);
  }

  function playVocab(btn, urlH, urlM) {
    const useH = toggle === 'h';
    toggle = useH ? 'm' : 'h';
    btn.classList.add('playing');
    btn.textContent = useH ? '♬♂' : '♬♀';
    player.src = useH ? urlH : urlM;
    player.playbackRate = currentSpeed;
    player.play();
    player.onended = () => { btn.classList.remove('playing'); btn.textContent = '▶'; };
  }

  window.addEventListener('load', function() {
    setTimeout(function() {
      document.getElementById('player').src = 'https://rubenbhai.github.io/GujaratiResources/audios/clase_1_1/Clase_1.1.1.1_h_tarat.mp3';
      document.getElementById('player').play().catch(function(){});
    }, 400);
  });
</script>

</body>
</html>
