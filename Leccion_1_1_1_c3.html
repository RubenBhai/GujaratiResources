<body>

<nav class="nav-bar">

</nav>

<div class="wrap">
  <span class="badge">Consonante 3 de 4</span>
  
  <div class="frame-img">
    <img src="https://rubenbhai.github.io/GujaratiResources/imagenes/Clase_1_1/img_alfa_sa.png" alt="Consonante સ" onerror="this.style.display='none'" onclick="window.location.href='Leccion_1_1_1_c4.html'" style="cursor:pointer">
    <div class="frame-img-label">Letra gujarati</div>
  </div>
  
  <div class="frame-audio">
    <div class="frame-audio-top">
      <div class="frame-audio-label">Suena como</div>
      <div class="frame-audio-desc">Suena como la <strong>s</strong> de <strong>sa</strong>po. &iexcl;Igual que en espa&ntilde;ol!</div>
    </div>
    <button class="frame-audio-btn" onclick="playAudio('https://rubenbhai.github.io/GujaratiResources/audios/alfabeto/c26_sa-hombre.mp3', this)">&#128266; Escuchar</button>
  </div>
</div>

<div class="bottom-actions">
  <a class="btn-fin" href="Leccion_1_1_1_v1.html">&#128221; Ir a palabras</a>
  <a class="btn-sec" href="Leccion_1_1_2_intro.html">&#9197; Siguiente lección</a>
</div>

<audio id="player"></audio>

<script>
  window.addEventListener('load', () => {
    setTimeout(() => { document.getElementById('player').src='https://rubenbhai.github.io/GujaratiResources/audios/alfabeto/c26_sa-hombre.mp3'; document.getElementById('player').play().catch(()=>{}); }, 400);
  });

  const player = document.getElementById('player');
  
  function playAudio(url, btn) {
    document.querySelectorAll('.frame-audio-btn').forEach(b => b.classList.remove('playing'));
    btn.classList.add('playing');
    btn.textContent = '▶ Reproduciendo...';
    player.src = url; player.playbackRate = 1.0; player.play();
    player.onended = () => { btn.classList.remove('playing'); btn.innerHTML = '&#128266; Escuchar'; };
  }

  // JUEGO (Lógica mantenida)
  const gameData = [
    { letter: 'ત', answer: 'ta', audio: 'https://rubenbhai.github.io/GujaratiResources/audios/alfabeto/c09_ta.mujer.mp3' },
    { letter: 'ર', answer: 'ra', audio: 'https://rubenbhai.github.io/GujaratiResources/audios/alfabeto/c27_ra-mujer.mp3' },
    { letter: 'સ', answer: 'sa', audio: 'https://rubenbhai.github.io/GujaratiResources/audios/alfabeto/c26_sa-hombre.mp3' },
    { letter: 'મ', answer: 'ma', audio: 'https://rubenbhai.github.io/GujaratiResources/audios/alfabeto/c23_ma-mujer.mp3' },
  ];
  let queue=[], idx=0, timer=null;
  function shuffle(a) { return [...a].sort(()=>Math.random()-0.5); }
  function initGame() { queue=shuffle(gameData); idx=0; showCard(); }
  function showCard() {
    const card=document.getElementById('game-card');
    if(!card) return;
    const item=queue[idx];
    card.textContent=item.letter; card.classList.remove('reveal');
    // ...resto de la lógica original del juego
  }
  if(document.getElementById('game-card')) initGame();
</script>
</body>
</html>
