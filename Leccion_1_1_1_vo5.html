<div class="wrap" style="padding-bottom:8px;">
  <span class="badge">Vocal 5 de 6</span>
  
  <div class="frame-img" style="max-width:320px; margin:0 auto;">
    <img src="https://rubenbhai.github.io/GujaratiResources/imagenes/Clase_1_1/img_alfa_o.png" alt="Vocal ઓ" onerror="this.style.display='none'" onclick="window.location.href='Leccion_1_1_1_c2.html'" style="cursor:pointer; max-height:380px; object-fit:contain; width:100%;">
  </div>
  
  
</div>

<div class="bottom-actions" style="max-width:320px; margin:0 auto; padding:0 0 24px 0; gap:10px;">
  <button class="btn-sec" style="border:none; cursor:pointer; font-family:inherit;" onclick="playAudio('https://rubenbhai.github.io/GujaratiResources/audios/clase_1_1/audio_alfa_m_o.mp3', this)" id="btn-escuchar">&#128266; Escuchar</button>
  <a class="btn-fin" style="margin-top:0;" href="Leccion_1_1_1_plana_o.html">Siguiente &rarr;</a>
  <a class="btn-sec" href="Leccion_1_1_2_intro.html">&#9197; Siguiente lección</a>
</div>

<audio id="player"></audio>

<script>
  window.addEventListener('load', () => {
    setTimeout(() => { document.getElementById('player').src='https://rubenbhai.github.io/GujaratiResources/audios/clase_1_1/audio_alfa_m_o.mp3'; document.getElementById('player').play().catch(()=>{}); }, 400);
  });

  const player = document.getElementById('player');
  
  function playAudio(url, btn) {
    document.querySelectorAll('.frame-audio-btn').forEach(b => b.classList.remove('playing'));
    btn.classList.add('playing');
    btn.textContent = '▶ Reproduciendo...';
    player.src = url; player.playbackRate = 1.0; player.play();
    player.onended = () => { btn.classList.remove('playing'); btn.innerHTML = '&#128266; Escuchar'; };
  }

  // JUEGO (Lógica mantenida)
  const BASE = 'https://rubenbhai.github.io/GujaratiResources/audios/clase_1_1/';
  const gameData = [
    { letter: 'ક', answer: 'ka',   audioM: BASE+'audio_alfa_m_ka.mp3',   audioH: BASE+'audio_alfa_h_ka.mp3'   },
    { letter: 'મ', answer: 'ma',   audioM: BASE+'audio_alfa_m_ma.mp3',   audioH: BASE+'audio_alfa_h_ma.mp3'   },
    { letter: 'છ', answer: 'chha', audioM: BASE+'audio_alfa_m_chha.mp3', audioH: BASE+'audio_alfa_h_chha.mp3' },
  ];
  let queue=[], idx=0, timer=null;
  function shuffle(a) { return [...a].sort(()=>Math.random()-0.5); }
  function initGame() { queue=shuffle(gameData); idx=0; showCard(); }
  function showCard() {
    const item=queue[idx];
    const card=document.getElementById('game-card');
    if(!card) return;
    const ans=document.getElementById('game-answer');
    const prog=document.getElementById('game-progress');
    const bar=document.getElementById('timer-bar');
    card.textContent=item.letter; card.classList.remove('reveal');
    ans.textContent=''; ans.classList.remove('visible');
    prog.textContent=(idx+1)+' de '+queue.length;
    bar.style.transition='none'; bar.style.transform='scaleX(1)';
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      bar.style.transition='transform 3s linear'; bar.style.transform='scaleX(0)';
    }));
    if(timer) clearTimeout(timer);
    timer=setTimeout(()=>reveal(item), 3000);
  }
  function reveal(item) {
    document.getElementById('game-card').classList.add('reveal');
    const ans=document.getElementById('game-answer');
    ans.textContent=item.answer; ans.classList.add('visible');
    player.src=item.audioM; player.playbackRate=1.0; player.play();
  }
  function gameNext() {
    idx++;
    if(idx<queue.length) { showCard(); }
    else { window.location.href='Leccion_1_1_1_v1.html'; }
  }
  if(document.getElementById('game-card')) initGame();
</script>

<script>
(function() {
  var VERSION_URL = 'https://rubenbhai.github.io/GujaratiResources/version.txt';
  fetch(VERSION_URL + '?t=' + Date.now(), { cache: 'no-store' })
    .then(function(r) { return r.text(); })
    .then(function(serverV) {
      serverV = serverV.trim();
      var localV = null;
      try { localV = localStorage.getItem('appVersion'); } catch(e) {}
      if (localV === null) {
        try { localStorage.setItem('appVersion', serverV); } catch(e) {}
      } else if (localV !== serverV) {
        try { localStorage.setItem('appVersion', serverV); } catch(e) {}
        location.reload(true);
      }
    })
    .catch(function() {});
})();
</script>
