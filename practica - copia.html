<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Practica tu pronunciación · Piensa en Gujarati</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Noto+Serif+Gujarati:wght@400;600;700&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; }
  :root {
    --bg: #2C2420;
    --surface: #362C28;
    --paper: #E8D9C0;
    --sindoor: #A8362A;
    --sindoor-deep: #832920;
    --saffron: #B8863D;
    --olive: #8A9678;
    --ink-soft: #C8B99A;
    --border: #4A3C34;
  }
  body {
    margin: 0;
    min-height: 100vh;
    background: var(--bg);
    background-image: radial-gradient(ellipse at top, rgba(184,134,61,0.07), transparent 60%);
    color: var(--paper);
    font-family: 'Source Sans 3', sans-serif;
    padding: 20px;
  }
  .gu { font-family: 'Noto Serif Gujarati', serif; }
  .wrap { max-width: 720px; margin: 0 auto; }

  .top-link {
    display: inline-block;
    color: var(--saffron);
    text-decoration: none;
    font-size: 0.88rem;
    margin: 18px 0 10px;
    background: rgba(44, 36, 32, 0.8);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    padding: 8px 16px;
    border-radius: 50px;
  }
  .top-link:hover { text-decoration: underline; }

  header { text-align: center; padding: 16px 0 18px; border-bottom: 1px solid var(--border); margin-bottom: 22px; }
  .badge {
    display: inline-block;
    background: rgba(168, 54, 42, 0.2);
    color: #EFA69D;
    padding: 5px 14px;
    border-radius: 30px;
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 10px;
  }
  h1 { font-family: 'Fraunces', serif; font-weight: 700; font-size: 1.35rem; line-height: 1.3; margin: 0 0 6px; }
  .subtitle-row { color: var(--ink-soft); font-size: 0.9rem; margin: 0; display: flex; justify-content: center; align-items: center; gap: 8px; flex-wrap: wrap; }
  .subtitle-row .separador { opacity: 0.5; }
  .progreso-indicador { color: var(--saffron); font-weight: 700; }

  .audio-theater { display: flex; flex-direction: column; gap: 22px; margin-bottom: 50px; }
  .dialogue-line {
    display: none;
    background: var(--surface);
    padding: 22px 24px;
    border-radius: 14px;
    border-left: 4px solid var(--border);
    transition: all 0.35s ease;
  }
  .dialogue-line.active {
    display: block;
    border-left-color: var(--saffron);
    box-shadow: 0 6px 18px rgba(0,0,0,0.35);
  }
  .dialogue-line img {
    max-width: 400px;
    max-height: 400px;
    object-fit: contain;
    display: block;
    margin: 0 auto 12px;
    border-radius: 10px;
  }
  .gujarati-text { font-size: 1.7rem; line-height: 2.5rem; color: #8a8174; margin-bottom: 6px; font-family: 'Noto Serif Gujarati', serif; transition: color 0.15s; }
  .dialogue-line.active .gujarati-text { color: var(--paper); }
  .spanish-text { font-size: 0.98rem; color: var(--ink-soft); margin-bottom: 16px; }

  .nav-row { display: flex; gap: 10px; margin-top: 18px; }
  .nav-row .btn { flex: 1; justify-content: center; }
  .btn-nav-arrow:disabled { opacity: 0.3; cursor: not-allowed; }
  .btn-nav-arrow:disabled:hover { background: #2e2419; color: var(--paper); }

  .action-bar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .btn {
    border: none;
    padding: 9px 16px;
    border-radius: 50px;
    cursor: pointer;
    font-weight: 600;
    font-size: 0.85rem;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.25s ease;
    background: #2e2419;
    color: var(--paper);
  }
  .btn-listen:hover { background: var(--saffron); color: #1a1410; }
  .btn-record.recording { background: var(--sindoor); animation: pulse 1.4s infinite; }
  .btn-record:hover:not(.recording) { background: var(--olive); color: #1a1410; }
  .btn-play-self { color: var(--olive); opacity: 0.4; cursor: not-allowed; }
  .btn-play-self:not([disabled]) { opacity: 1; cursor: pointer; }
  .btn-play-self:not([disabled]):hover { background: var(--olive); color: #1a1410; }
  .btn-next-practice { background: var(--saffron); color: #1a1410; }
  .btn-next-practice:hover { background: #cf9a48; }
  @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.02); } }

  .loading-ia { display: none; color: var(--saffron); font-size: 0.85rem; font-weight: 600; animation: pulse 1s infinite; }

  .eval-panel {
    margin-top: 14px;
    padding: 14px 18px;
    border-radius: 10px;
    background: #15110c;
    border: 1px solid var(--border);
    display: none;
  }
  .eval-nota { font-size: 1.1rem; font-weight: 700; margin: 0 0 5px; }
  .eval-transcripcion { font-size: 0.9rem; color: #ccc; margin: 0 0 5px; font-style: italic; }
  .eval-consejo { font-size: 0.88rem; color: var(--saffron); margin: 0; line-height: 1.4; }

  .empty-state, .error-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--ink-soft);
  }

  .speed-bar {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-top: 12px;
  }
  .btn-speed {
    border: 1px solid var(--border);
    background: #2e2419;
    color: var(--ink-soft);
    padding: 6px 16px;
    border-radius: 50px;
    cursor: pointer;
    font-size: 0.82rem;
    font-weight: 700;
    transition: all 0.25s ease;
  }
  .btn-speed.active {
    background: var(--saffron);
    color: #1a1410;
    border-color: var(--saffron);
  }
  .btn-speed:hover:not(.active) {
    border-color: var(--saffron);
    color: var(--saffron);
  }
  .speed-label {
    font-size: 0.7rem;
    color: var(--ink-soft);
    opacity: 0.75;
    text-align: center;
    margin-top: 4px;
  }

  footer { text-align: center; padding: 30px 0 10px; color: var(--ink-soft); font-size: 0.85rem; }
  footer a { color: var(--saffron); text-decoration: none; }
</style>
</head>
<body>

<div class="wrap">
  <a class="top-link" href="#" id="back-link" onclick="history.back(); return false;">← Volver al módulo</a>

  <header>
    <span class="badge">Práctica con evaluación de Gemini</span>
    <h1 id="page-title">Cargando…</h1>
    <p class="subtitle-row">
      <span id="page-subtitle"></span>
      <span class="separador">·</span>
      <span class="progreso-indicador" id="progreso-indicador"></span>
    </p>
    <div class="speed-bar">
      <button class="btn-speed" onclick="setSpeed(0.75)">🐢 0.75x</button>
      <button class="btn-speed active" id="speed-1" onclick="setSpeed(1.0)">▶ 1x</button>
      <button class="btn-speed" onclick="setSpeed(1.25)">⚡ 1.25x</button>
    </div>
    <p class="speed-label">Velocidad de reproducción (solo afecta el audio de referencia)</p>
  </header>

  <section class="audio-theater" id="theater"></section>

  <footer>
    <p>Piensa en Gujarati — <a href="index.html">volver al índice del curso</a></p>
  </footer>
</div>

<audio id="master-player" playsinline></audio>
<audio id="self-player" playsinline></audio>

<script>
  const BACKEND_URL = "https://gujaratitraining-production.up.railway.app";
  const LOGIN_URL = "https://rubenbhai.github.io/GujaratiTraining/index.html";

  const params = new URLSearchParams(window.location.search);
  const modulo = params.get('modulo');
  const leccion = params.get('leccion');
  const claveLeccion = `${modulo}-${leccion}`;

  const masterPlayer = document.getElementById('master-player');
  const selfPlayer = document.getElementById('self-player');
  let mediaRecorder;
  let audioChunks = {};
  let recordingLineId = null;
  let currentSpeed = 1.0;

  function setSpeed(speed) {
    currentSpeed = speed;
    masterPlayer.playbackRate = speed;
    document.querySelectorAll('.btn-speed').forEach(btn => btn.classList.remove('active'));
    const labels = { 0.75: '🐢 0.75x', 1.0: '▶ 1x', 1.25: '⚡ 1.25x' };
    document.querySelectorAll('.btn-speed').forEach(btn => {
      if (btn.innerText === labels[speed]) btn.classList.add('active');
    });
  }

  if (!modulo || !leccion) {
    document.getElementById('theater').innerHTML =
      `<div class="error-state">Parámetros inválidos en la URL. Verifica los valores de 'modulo' y 'leccion'.</div>`;
  } else {
    const jsonFile = `https://rubenbhai.github.io/GujaratiResources/data/practica_clase_${modulo.replace('.','_')}_${leccion}.json`;
    
    fetch(jsonFile)
      .then(res => {
        if (!res.ok) throw new Error(`No se encontró ${jsonFile}`);
        return res.json();
      })
      .then(data => {
        const leccionData = data[claveLeccion];
        if (!leccionData) {
          document.getElementById('theater').innerHTML =
            `<div class="error-state">No se encontró la lección ${claveLeccion}. Verifica el enlace.</div>`;
          return;
        }
        construirInterfaz(leccionData);
      })
      .catch(err => {
        console.error(err);
        document.getElementById('theater').innerHTML =
          `<div class="error-state">No se pudo cargar el contenido de práctica. Intenta de nuevo más tarde. (${err.message})</div>`;
      });
  }

  function construirInterfaz(leccionData) {
    document.getElementById('page-title').innerText = leccionData.titulo;
    document.getElementById('page-subtitle').innerText = 'Fuente: ' + leccionData.fuente;

    const theater = document.getElementById('theater');
    const total = leccionData.frases.length;
    leccionData.frases.forEach(function(frase, i) {
      var lineId = 'line-' + i;
      var div = document.createElement('div');
      div.className = 'dialogue-line' + (i === 0 ? ' active' : '');
      div.id = lineId;

      var gu = frase.gujarati.replace(/'/g, "\'");
      var imgHtml = frase.imagen
        ? '<img src="' + frase.imagen + '" onerror="this.style.display=\'none\'">'
        : '';
      var btnMujer = frase.audioClip2
        ? '<button class="btn btn-listen" onclick="playMaster(\'' + frase.audioClip2 + '\',\'' + lineId + '\',null,null)">&#9792; Mujer</button>'
        : '';

      var btnPrev = (i > 0)
        ? '<button class="btn btn-nav-arrow" onclick="irAProxima(' + (i - 1) + ')">&#8592; Anterior</button>'
        : '<button class="btn btn-nav-arrow" disabled>&#8592; Anterior</button>';

      var btnNext = (i < total - 1)
        ? '<button class="btn btn-next-practice" onclick="irAProxima(' + (i + 1) + ')">Siguiente &#8594;</button>'
        : '<button class="btn btn-next-practice" onclick="irAlFinal()">&#127937; Terminar</button>';

      div.innerHTML = imgHtml
        + '<div class="gujarati-text">' + frase.gujarati + '</div>'
        + '<div class="spanish-text">' + frase.espanol + '</div>'
        + '<div class="action-bar">'
        + '<button class="btn btn-listen" onclick="playMaster(\'' + frase.audioClip + '\',\'' + lineId + '\',null,null)">&#128266; Escuchar</button>'
        + btnMujer
        + '<button class="btn btn-record" id="rec-' + lineId + '" onclick="toggleRecord(\'' + lineId + '\',\'' + gu + '\')">&#127899; Practicar</button>'
        + '<button class="btn btn-play-self" id="play-' + lineId + '" onclick="playRecorded(\'' + lineId + '\')" disabled>&#127911; Escucharme</button>'
        + '<span id="load-' + lineId + '" class="loading-ia">&#10024; Evaluando&#8230;</span>'
        + '</div>'
        + '<div class="eval-panel" id="eval-panel-' + lineId + '">'
        + '<p class="eval-nota" id="nota-' + lineId + '">&#11088; Nota: 0/10</p>'
        + '<p class="eval-transcripcion" id="trans-' + lineId + '"></p>'
        + '<p class="eval-consejo" id="consejo-' + lineId + '"></p>'
        + '</div>'
        + '<div class="nav-row">' + btnPrev + btnNext + '</div>';

      theater.appendChild(div);
    });

    actualizarProgreso(0);
  }

  function irAProxima(indice) {
    var destino = document.getElementById('line-' + indice);
    if (destino) {
      document.querySelectorAll('.dialogue-line').forEach(function(l){ l.classList.remove('active'); });
      destino.classList.add('active');
      window.scrollTo({ top: 0, behavior: 'smooth' });
      actualizarProgreso(indice);
    }
  }

  function actualizarProgreso(indice) {
    var total = document.querySelectorAll('.dialogue-line').length;
    var el = document.getElementById('progreso-indicador');
    if (el) el.textContent = (indice + 1) + ' de ' + total;
  }

  function irAlFinal() {
    history.back();
  }

  function playMaster(archivoUrl, lineId, inicio, fin) {
    masterPlayer.src = archivoUrl;
    masterPlayer.load();

    masterPlayer.onloadedmetadata = function() {
      if (inicio !== null) masterPlayer.currentTime = inicio;
      masterPlayer.playbackRate = currentSpeed;
      masterPlayer.play().catch(e => console.log("Interacción requerida"));
    };

    if (fin !== null) {
      masterPlayer.ontimeupdate = function() {
        if (masterPlayer.currentTime >= fin) {
          masterPlayer.pause();
        }
      };
    } else {
      masterPlayer.ontimeupdate = null;
    }
  }

  function toggleRecord(lineId, fraseObjetivo) {
    const btn = document.getElementById(`rec-${lineId}`);

    if (mediaRecorder && mediaRecorder.state === "recording") {
      mediaRecorder.stop();
      if (recordingLineId) {
        const prevBtn = document.getElementById(`rec-${recordingLineId}`);
        if (prevBtn) {
          prevBtn.innerHTML = "🎙️ Practicar";
          prevBtn.classList.remove('recording');
        }
      }
      if (recordingLineId === lineId) {
        recordingLineId = null;
        return;
      }
    }

    recordingLineId = lineId;

    navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
      mediaRecorder = new MediaRecorder(stream);
      audioChunks[lineId] = [];

      mediaRecorder.ondataavailable = e => {
        if (e.data && e.data.size > 0) audioChunks[lineId].push(e.data);
      };

      mediaRecorder.onstop = () => {
        const tipoReal = mediaRecorder.mimeType || "audio/webm";
        const blob = new Blob(audioChunks[lineId], { type: tipoReal });
        const url = URL.createObjectURL(blob);

        const playBtn = document.getElementById(`play-${lineId}`);
        if (playBtn) {
          playBtn.removeAttribute('disabled');
          playBtn.dataset.url = url;
        }
        convertirAudioABase64(blob, lineId, fraseObjetivo);
      };

      mediaRecorder.start();
      btn.innerHTML = "🛑 Detener";
      btn.classList.add('recording');
    }).catch(() => {
      alert("Verifica los permisos de tu micrófono en los ajustes del dispositivo.");
    });
  }

  function playRecorded(lineId) {
    const playBtn = document.getElementById(`play-${lineId}`);
    if (playBtn && playBtn.dataset.url) {
      selfPlayer.src = playBtn.dataset.url;
      selfPlayer.load();
      selfPlayer.play().catch(() => {
        alert("Asegúrate de que el switch físico de silencio de tu dispositivo no esté activado.");
      });
    }
  }

  function convertirAudioABase64(blob, lineId, fraseObjetivo) {
    const reader = new FileReader();
    reader.readAsDataURL(blob);
    reader.onloadend = () => {
      const base64Limpio = reader.result.split(',')[1];
      const mimeTypeReal = blob.type || "audio/webm";
      enviarAlTeatroIA(base64Limpio, mimeTypeReal, fraseObjetivo, lineId);
    };
  }

  function enviarAlTeatroIA(audioBase64, mimeType, fraseObjetivo, lineId) {
    const spinner = document.getElementById(`load-${lineId}`);
    const panel = document.getElementById(`eval-panel-${lineId}`);

    if (spinner) spinner.style.display = "inline-block";
    if (panel) panel.style.display = "none";

    fetch(`${BACKEND_URL}/api/evaluar-audio`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-access-token': sessionStorage.getItem('accessToken') || ''
      },
      body: JSON.stringify({ audioBase64, mimeType, fraseObjetivo })
    })
    .then(res => {
      if (!res.ok) throw new Error("Error en la respuesta del servidor");
      return res.json();
    })
    .then(data => {
      document.getElementById(`nota-${lineId}`).innerText = `⭐ Nota: ${data.nota}/10`;
      document.getElementById(`trans-${lineId}`).innerText = `Gemini entendió: "${data.transcripcion}"`;
      document.getElementById(`consejo-${lineId}`).innerText = `💡 Consejo: ${data.consejo}`;
      document.getElementById(`nota-${lineId}`).style.color = data.nota >= 7 ? "#D4A24C" : "#C24A3A";
      if (panel) panel.style.display = "block";
    })
    .catch(err => {
      console.error("Error conectando al backend:", err);
      alert("Hubo un detalle al recibir la nota de Gemini. Inténtalo de nuevo.");
    })
    .finally(() => {
      if (spinner) spinner.style.display = "none";
    });
  }
</script>

<script>
(function() {
  var VERSION_URL = 'https://rubenbhai.github.io/GujaratiResources/version.txt';
  fetch(VERSION_URL + '?t=' + Date.now(), { cache: 'no-store' })
    .then(function(r) { return r.text(); })
    .then(function(serverV) {
      serverV = serverV.trim();
      var localV = null;
      try { localV = localStorage.getItem('appVersion'); } catch(e) {}
      if (localV === null) {
        try { localStorage.setItem('appVersion', serverV); } catch(e) {}
      } else if (localV !== serverV) {
        try { localStorage.setItem('appVersion', serverV); } catch(e) {}
        location.reload(true);
      }
    })
    .catch(function() {});
})();
</script>
</body>
</html>
