<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Notas del Gujarati &middot; Piensa en Gujarati</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Noto+Serif+Gujarati:wght@400;600;700&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#2C2420; --surface:#362C28; --surface-light:#423631; --paper:#E8D9C0;
  --sindoor:#A8362A; --sindoor-deep:#832920; --saffron:#B8863D; --olive:#5F6E4F;
  --verde:#4A6B53; --verde-h:#3D5A45; --ink-soft:#C8B99A; --border:rgba(184,134,61,0.18);
  --r-md:16px; --r-lg:20px; --r-full:50px;
}
body { background:var(--bg); background-image:radial-gradient(ellipse at top,rgba(184,134,61,0.07),transparent 60%);
  color:var(--paper); font-family:'Source Sans 3',sans-serif; min-height:100vh; padding-bottom:20px; }
.gu { font-family:'Noto Serif Gujarati',serif; }
.nav-bar { position:sticky; top:0; z-index:100; background:rgba(44,36,32,0.9); backdrop-filter:blur(10px);
  border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; padding:12px 20px; gap:8px; }
.nav-btn { background:var(--surface); color:var(--paper); padding:10px 18px; border-radius:var(--r-full);
  font-size:0.9rem; font-weight:600; text-decoration:none; border:1px solid var(--border); cursor:pointer; }
.nav-btn.home { color:var(--saffron); font-size:1.1rem; }
.nav-btn.disabled { opacity:0.35; pointer-events:none; }

.top-progress { width:100%; height:6px; background:rgba(255,255,255,0.06); }
.top-progress-fill { height:100%; background:linear-gradient(90deg,var(--saffron),var(--sindoor)); width:0%; transition:width 0.4s ease; }

.wrap { max-width:480px; margin:0 auto; padding:28px 20px; display:flex; flex-direction:column; align-items:center; gap:22px; }
.screen { display:none; width:100%; flex-direction:column; align-items:center; gap:22px; }
.screen.active { display:flex; animation:fadeIn 0.4s ease; }
@keyframes fadeIn { from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);} }

.badge { display:inline-block; background:rgba(184,134,61,0.18); color:var(--saffron); padding:8px 20px;
  border-radius:var(--r-full); font-size:0.85rem; font-weight:700; text-transform:uppercase; letter-spacing:0.08em; }
h1 { font-family:'Fraunces',serif; font-size:1.7rem; text-align:center; line-height:1.2; }
.lead { color:var(--ink-soft); font-size:1.1rem; line-height:1.6; text-align:center; }

.nota-card { width:100%; background:var(--surface); border:1px solid var(--border);
  border-radius:var(--r-lg); padding:26px 24px; box-shadow:0 8px 28px rgba(0,0,0,0.22); }
.nota-gu { font-size:3.2rem; text-align:center; color:var(--saffron); line-height:1; margin-bottom:14px; }
.nota-texto { font-size:1.18rem; line-height:1.7; color:var(--paper); text-align:center; }
.nota-texto strong { color:var(--saffron); }

.ejemplo { width:100%; background:var(--surface-light); border-left:4px solid var(--olive);
  border-radius:12px; padding:16px 18px; margin-top:8px; }
.ejemplo-gu { font-size:1.8rem; color:var(--paper); text-align:center; margin-bottom:6px; }
.ejemplo-lit { font-size:0.98rem; color:var(--ink-soft); font-style:italic; text-align:center; }
.ejemplo-sig { font-size:1.1rem; color:var(--saffron); font-weight:700; text-align:center; margin-top:4px; }

.destacado { background:linear-gradient(135deg, rgba(168,54,42,0.22), rgba(184,134,61,0.15));
  border:2px solid var(--saffron); }

.btn-main { width:100%; border:none; padding:16px; border-radius:var(--r-full); cursor:pointer;
  font-weight:700; font-size:1.05rem; background:var(--verde); color:white; text-align:center;
  text-decoration:none; display:block; box-shadow:0 4px 14px rgba(74,107,83,0.3); font-family:inherit; }
.btn-main:hover { background:var(--verde-h); }
.btn-sec { width:100%; padding:13px; border-radius:var(--r-full); font-weight:600; font-size:0.95rem;
  background:var(--surface); border:1px solid var(--border); color:var(--ink-soft); text-align:center;
  cursor:pointer; font-family:inherit; text-decoration:none; display:block; }
.btn-sec:hover { background:var(--surface-light); color:var(--saffron); }
.btn-row { display:flex; gap:10px; width:100%; }
.btn-row .btn-sec, .btn-row .btn-main { flex:1; }
</style>
</head>
<body>

<nav class="nav-bar">
  <a class="nav-btn" id="nav-salir" href="#">← Salir</a>
  <a class="nav-btn home" id="nav-home" href="#">🏠</a>
  <a class="nav-btn" id="nav-terminar" href="#">Terminar →</a>
</nav>
<div class="top-progress"><div class="top-progress-fill" id="top-fill"></div></div>

<div class="wrap" id="contenedor-pantallas"></div>

<script>
  const BASE   = 'https://rubenbhai.github.io/GujaratiResources';
  const _params     = new URLSearchParams(location.search);
  const _leccionRaw = _params.get('leccion') || '1.1.1';
  const _leccion     = _leccionRaw.replace(/\./g, '_');
  const JSON_URL    = 'data/leccion_notas_' + _leccion + '.json';

  let TOTAL = 0;

  function ir(n) {
    document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('active'); });
    document.getElementById('s' + n).classList.add('active');
    document.getElementById('top-fill').style.width = Math.round((n / (TOTAL - 1)) * 100) + '%';
    window.scrollTo(0, 0);
  }

  function crearBloqueNota(b) {
    const nodos = [];
    if (b.tipo === 'texto') {
      if (b.gu) {
        const guDiv = document.createElement('div');
        guDiv.className = 'gu nota-gu';
        guDiv.textContent = b.gu;
        nodos.push(guDiv);
      }
      const texDiv = document.createElement('div');
      texDiv.className = 'nota-texto';
      texDiv.innerHTML = b.html;
      nodos.push(texDiv);
    } else if (b.tipo === 'ejemplo') {
      const div = document.createElement('div');
      div.className = 'ejemplo';
      div.innerHTML =
        '<div class="gu ejemplo-gu">' + b.gu + '</div>' +
        '<div class="ejemplo-lit">literalmente: "' + b.literal + '"</div>' +
        '<div class="ejemplo-sig">se entiende: "' + b.significado + '"</div>';
      nodos.push(div);
    }
    return nodos;
  }

  fetch(JSON_URL + '?t=' + Date.now(), { cache: 'no-store' })
    .then(function(r){ if(!r.ok) throw new Error('404'); return r.json(); })
    .then(function(data){
      document.getElementById('nav-salir').href = data.salir;
      document.getElementById('nav-home').href = data.home;
      document.getElementById('nav-terminar').href = data.fin;

      const notas = data.notas;
      const totalNotas = notas.length;
      TOTAL = totalNotas + 2; // intro + notas + fin

      const contenedor = document.getElementById('contenedor-pantallas');

      // s0: intro
      const s0 = document.createElement('div');
      s0.className = 'screen active';
      s0.id = 's0';
      s0.innerHTML =
        '<span class="badge">Notas del Gujarati</span>' +
        '<h1>' + data.intro.titulo + '</h1>' +
        '<p class="lead">' + data.intro.texto + '</p>';
      const btnEmpezar = document.createElement('button');
      btnEmpezar.className = 'btn-main';
      btnEmpezar.textContent = 'Empecemos →';
      btnEmpezar.onclick = function(){ ir(1); };
      s0.appendChild(btnEmpezar);
      contenedor.appendChild(s0);

      // s1..sN: notas
      notas.forEach(function(nota, i){
        const n = i + 1;
        const s = document.createElement('div');
        s.className = 'screen';
        s.id = 's' + n;

        const badge = document.createElement('span');
        badge.className = 'badge';
        badge.textContent = n + ' de ' + totalNotas;
        s.appendChild(badge);

        const card = document.createElement('div');
        card.className = 'nota-card' + (nota.destacado ? ' destacado' : '');
        nota.bloques.forEach(function(b, bi){
          const bloqueNodos = crearBloqueNota(b);
          bloqueNodos.forEach(function(nodo){
            if (b.tipo === 'texto' && bi > 0) nodo.style.marginTop = '18px';
            card.appendChild(nodo);
          });
        });
        s.appendChild(card);

        const btnRow = document.createElement('div');
        btnRow.className = 'btn-row';
        const btnAtras = document.createElement('button');
        btnAtras.className = 'btn-sec';
        btnAtras.textContent = '← Atrás';
        btnAtras.onclick = function(){ ir(n - 1); };
        const btnSig = document.createElement('button');
        btnSig.className = 'btn-main';
        btnSig.textContent = (n === totalNotas) ? 'Entendido →' : 'Siguiente →';
        btnSig.onclick = function(){ ir(n + 1); };
        btnRow.appendChild(btnAtras);
        btnRow.appendChild(btnSig);
        s.appendChild(btnRow);

        contenedor.appendChild(s);
      });

      // s(N+1): fin
      const sFin = document.createElement('div');
      sFin.className = 'screen';
      sFin.id = 's' + (totalNotas + 1);
      sFin.innerHTML =
        '<span class="badge">¡Listo!</span>' +
        '<h1>' + data.fin_pantalla.titulo + '</h1>' +
        '<p class="lead">' + data.fin_pantalla.texto + '</p>';

      const extra = data.fin_pantalla.boton_extra;
      if (extra && extra.habilitado) {
        const btnExtra = document.createElement('a');
        btnExtra.className = 'btn-sec';
        btnExtra.href = extra.pagina + '?leccion=' + _leccionRaw;
        btnExtra.textContent = extra.caption;
        sFin.appendChild(btnExtra);
      }

      const btnFin = document.createElement('a');
      btnFin.className = 'btn-main';
      btnFin.href = data.fin;
      btnFin.textContent = 'Terminar lección →';
      sFin.appendChild(btnFin);
      contenedor.appendChild(sFin);
    })
    .catch(function(){
      document.body.innerHTML =
        '<p style="text-align:center;color:var(--ink-soft);padding:40px;">No se pudo cargar el contenido. Revisa tu conexión.</p>';
    });
</script>

<script>
(function() {
  var VERSION_URL = 'https://rubenbhai.github.io/GujaratiResources/version.txt';
  fetch(VERSION_URL + '?t=' + Date.now(), { cache: 'no-store' })
    .then(function(r) { return r.text(); })
    .then(function(serverV) {
      serverV = serverV.trim();
      var localV = null;
      try { localV = localStorage.getItem('appVersion'); } catch(e) {}
      if (localV === null) {
        try { localStorage.setItem('appVersion', serverV); } catch(e) {}
      } else if (localV !== serverV) {
        try { localStorage.setItem('appVersion', serverV); } catch(e) {}
        location.reload(true);
      }
    })
    .catch(function() {});
})();
</script>
</body>
</html>
