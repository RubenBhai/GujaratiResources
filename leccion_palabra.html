<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title id="page-title">Vocabulario &middot; Piensa en Gujarati</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Noto+Serif+Gujarati:wght@400;700&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="tema-amigable_4.css">
</head>
<body>

<nav class="nav-bar">
  <a class="nav-btn" id="nav-anterior" href="#">← Anterior</a>
  <a class="nav-btn home" id="nav-home" href="#">🏠</a>
  <a class="nav-btn" id="nav-practicar" href="#">Practicar →</a>
</nav>

<div class="wrap">
  <span class="badge" id="badge"></span>

  <div class="frame-vocab-img">
    <img id="img-palabra" alt="" onerror="this.style.display='none'" style="cursor:pointer">
  </div>

  <div class="frame-vocab-audio">
    <div class="frame-vocab-audio-top">
      <div class="frame-vocab-pron" id="pronunciacion">💡</div>
      <button class="btn-play" id="btn-play">▶</button>
    </div>
    <div class="frame-vocab-audio-bottom">
      <button class="btn-speed active" id="btn-normal" onclick="setSpeed(1.0)">▶ Normal</button>
      <button class="btn-speed" id="btn-slow" onclick="setSpeed(0.75)">🐢 Lento</button>
    </div>
  </div>

  <div class="botones-inferiores">
    <a class="btn-main" id="btn-siguiente" href="#">Siguiente →</a>
    <a class="btn-sec" id="btn-practicar-pronunciacion" href="#" style="display:none;">🎙 A practicar la pronunciación</a>
    <a class="btn-sec" id="btn-sigleccion" href="#">⏭️ Siguiente lección</a>
  </div>
</div>

<audio id="player"></audio>

<script>
  const BASE   = 'https://rubenbhai.github.io/GujaratiResources';
  const player = document.getElementById('player');
  let currentSpeed = 1.0;
  let toggle = 'm';

  const _params     = new URLSearchParams(location.search);
  const _leccionRaw = _params.get('leccion') || '1.1.1';
  const _leccion     = _leccionRaw.replace(/\./g, '_');
  const _item       = parseInt(_params.get('item') || '1', 10);
  const JSON_URL    = 'data/leccion_palabra_' + _leccion + '.json';

  function setSpeed(s) {
    currentSpeed = s;
    document.getElementById('btn-normal').classList.toggle('active', s === 1.0);
    document.getElementById('btn-slow').classList.toggle('active', s === 0.75);
  }

  function playVocab(btn, urlH, urlM) {
    const useH = toggle === 'h';
    toggle = useH ? 'm' : 'h';
    btn.classList.add('playing');
    btn.textContent = useH ? '♬♂' : '♬♀';
    player.src = useH ? urlH : urlM;
    player.playbackRate = currentSpeed;
    player.play();
    player.onended = () => { btn.classList.remove('playing'); btn.textContent = '▶'; };
  }

  fetch(JSON_URL + '?t=' + Date.now(), { cache: 'no-store' })
    .then(function(r){ if(!r.ok) throw new Error('404'); return r.json(); })
    .then(function(data){
      const palabras = data.palabras;
      const total    = palabras.length;
      const idx      = Math.min(Math.max(_item, 1), total);
      const actual   = palabras[idx - 1];

      document.getElementById('page-title').textContent = actual.gujarati + ' — ' + actual.significado + ' · Piensa en Gujarati';
      document.getElementById('badge').textContent = 'Vocabulario ' + idx + ' de ' + total;

      document.getElementById('nav-home').href = data.home;
      document.getElementById('nav-practicar').href = data.practicar;
      document.getElementById('nav-anterior').href = (idx > 1)
        ? ('leccion_palabra.html?leccion=' + _leccionRaw + '&item=' + (idx - 1))
        : data.anterior_primera;

      const siguienteUrl = (idx < total)
        ? ('leccion_palabra.html?leccion=' + _leccionRaw + '&item=' + (idx + 1))
        : data.siguiente_final;

      const btnPracticarPron = document.getElementById('btn-practicar-pronunciacion');
      if (idx === total) {
        btnPracticarPron.href = data.practicar;
        btnPracticarPron.style.display = '';
      } else {
        btnPracticarPron.style.display = 'none';
      }

      const img = document.getElementById('img-palabra');
      img.src = actual.imagen;
      img.alt = actual.gujarati;
      img.onclick = function(){ window.location.href = siguienteUrl; };

      document.getElementById('pronunciacion').innerHTML = '💡 ' + actual.pronunciacion;

      const btnPlay = document.getElementById('btn-play');
      btnPlay.onclick = function(){ playVocab(btnPlay, actual.audioH, actual.audioM); };

      document.getElementById('btn-siguiente').href = siguienteUrl;
      document.getElementById('btn-sigleccion').href = data.siguiente_leccion;

      setTimeout(function() {
        player.src = actual.audioM;
        player.play().catch(function(){});
      }, 400);
    })
    .catch(function(){
      document.body.innerHTML =
        '<p style="text-align:center;color:var(--ink-soft);padding:40px;">No se pudo cargar el contenido. Revisa tu conexión.</p>';
    });
</script>

<script>
(function() {
  var VERSION_URL = 'https://rubenbhai.github.io/GujaratiResources/version.txt';
  fetch(VERSION_URL + '?t=' + Date.now(), { cache: 'no-store' })
    .then(function(r) { return r.text(); })
    .then(function(serverV) {
      serverV = serverV.trim();
      var localV = null;
      try { localV = localStorage.getItem('appVersion'); } catch(e) {}
      if (localV === null) {
        try { localStorage.setItem('appVersion', serverV); } catch(e) {}
      } else if (localV !== serverV) {
        try { localStorage.setItem('appVersion', serverV); } catch(e) {}
        location.reload(true);
      }
    })
    .catch(function() {});
})();
</script>
</body>
</html>
