<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Plana Chha &middot; Piensa en Gujarati</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Noto+Serif+Gujarati:wght@400;500;600;700&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="tema-amigable_3.css">
</head>
<body>

<nav class="nav-bar">
  <a class="nav-btn" href="Leccion_1_1_1_c3.html">&larr; Anterior</a>
  <a class="nav-btn home" href="Leccion_1_1_1_intro.html">&#127968;</a>
  <a class="nav-btn" href="Leccion_1_1_1_v_intro.html">Ir a palabras</a>
</nav>

<div class="wrap" style="padding-bottom:8px;">
  <span class="badge">Haz tu plana</span>

  <div class="info-box" style="font-size:1.2rem; color:var(--paper); line-height:1.7; text-align:center;">
    Haz esta plana <strong>varias veces</strong>.<br><br>
    Cada vez que termines de dibujar la letra, pronuncia en voz alta:
    <span style="color:var(--saffron); font-size:1.6rem; font-weight:700;">"Chha"</span>
  </div>

  <div class="frame-img" style="max-width:340px; margin:0 auto;">
    <img src="https://rubenbhai.github.io/GujaratiResources/imagenes/Clase_1_1/img_plana_chha.png" alt="Plana Chha" onerror="this.style.opacity='0.3'" style="max-height:440px; object-fit:contain; width:100%;">
  </div>
</div>

<div class="bottom-actions" style="max-width:340px; margin:0 auto; padding:0 0 24px 0; gap:10px;">
  <button class="btn-sec" style="border:none; cursor:pointer; font-family:inherit;" onclick="playAudio('https://rubenbhai.github.io/GujaratiResources/audios/clase_1_1/audio_alfa_m_chha.mp3', this)" id="btn-escuchar">&#128266; Escuchar "Chha"</button>
  <a class="btn-fin" style="margin-top:0;" href="Leccion_1_1_1_vo1.html">Ya terminé, continuar &rarr;</a>
</div>

<audio id="player"></audio>

<script>
  const player = document.getElementById('player');
  function playAudio(url, btn) {
    btn.classList.add('playing');
    btn.textContent = '▶ Reproduciendo...';
    player.src = url; player.playbackRate = 1.0; player.play();
    player.onended = () => { btn.classList.remove('playing'); btn.innerHTML = '&#128266; Escuchar "Chha"'; };
  }
</script>

<script>
(function() {
  var VERSION_URL = 'https://rubenbhai.github.io/GujaratiResources/version.txt';
  fetch(VERSION_URL + '?t=' + Date.now(), { cache: 'no-store' })
    .then(function(r) { return r.text(); })
    .then(function(serverV) {
      serverV = serverV.trim();
      var localV = null;
      try { localV = localStorage.getItem('appVersion'); } catch(e) {}
      if (localV === null) {
        try { localStorage.setItem('appVersion', serverV); } catch(e) {}
      } else if (localV !== serverV) {
        try { localStorage.setItem('appVersion', serverV); } catch(e) {}
        location.reload(true);
      }
    })
    .catch(function() {});
})();
</script>
</body>
</html>
