<body>

<nav class="nav-bar">
  <a class="nav-btn" href="Leccion_1_1_1_v6.html">← Anterior</a>
  <a class="nav-btn home" href="Leccion_1_1_1_intro.html">🏠</a>
  <a class="nav-btn" href="https://rubenbhai.github.io/GujaratiResources/practica.html?modulo=1.1&leccion=1">Practicar →</a>
</nav>

<div class="wrap">
  <span class="badge">Vocabulario 7 de 8</span>

  <div class="frame-vocab-img">
    <img src="https://rubenbhai.github.io/GujaratiResources/imagenes/Clase_1_1/img_kaakaa_info.png" alt="કાકા" onerror="this.style.display='none'" onclick="window.location.href='Leccion_1_1_1_v8.html'" style="cursor:pointer">
  </div>

  <div class="frame-vocab-audio">
    <div class="frame-vocab-audio-top">
      <div class="frame-vocab-pron">💡 ક-ા-ક-ા → kaa-<strong>kaa</strong></div>
      <button class="btn-play" onclick="playVocab(this, 'https://rubenbhai.github.io/GujaratiResources/audios/clase_1_1/audio_h_kaakaa.mp3', 'https://rubenbhai.github.io/GujaratiResources/audios/clase_1_1/audio_m_kaakaa.mp3')">▶</button>
    </div>
    <div class="frame-vocab-audio-bottom">
      <button class="btn-speed active" id="btn-normal" onclick="setSpeed(1.0)">▶ Normal</button>
      <button class="btn-speed" id="btn-slow" onclick="setSpeed(0.75)">🐢 Lento</button>
    </div>
  </div>

  <div class="botones-inferiores">
    <a class="btn-main" href="Leccion_1_1_1_v8.html">Siguiente →</a>
    <a class="btn-sec" href="Leccion_1_1_2_intro.html">⏭️ Siguiente lección</a>
  </div>
</div>

<audio id="player"></audio>

<script>
  const player = document.getElementById('player');
  let currentSpeed = 1.0;
  let toggle = 'm';

  function setSpeed(s) {
    currentSpeed = s;
    document.getElementById('btn-normal').classList.toggle('active', s === 1.0);
    document.getElementById('btn-slow').classList.toggle('active', s === 0.75);
  }

  function playVocab(btn, urlH, urlM) {
    const useH = toggle === 'h';
    toggle = useH ? 'm' : 'h';
    btn.classList.add('playing');
    btn.textContent = useH ? '♬♂' : '♬♀';
    player.src = useH ? urlH : urlM;
    player.playbackRate = currentSpeed;
    player.play();
    player.onended = () => { btn.classList.remove('playing'); btn.textContent = '▶'; };
  }

  window.addEventListener('load', function() {
    setTimeout(function() {
      document.getElementById('player').src = 'https://rubenbhai.github.io/GujaratiResources/audios/clase_1_1/audio_m_kaakaa.mp3';
      document.getElementById('player').play().catch(function(){});
    }, 400);
  });
</script>


<script>
(function() {
  var VERSION_URL = 'https://rubenbhai.github.io/GujaratiResources/version.txt';
  fetch(VERSION_URL + '?t=' + Date.now(), { cache: 'no-store' })
    .then(function(r) { return r.text(); })
    .then(function(serverV) {
      serverV = serverV.trim();
      var localV = null;
      try { localV = localStorage.getItem('appVersion'); } catch(e) {}
      if (localV === null) {
        try { localStorage.setItem('appVersion', serverV); } catch(e) {}
      } else if (localV !== serverV) {
        try { localStorage.setItem('appVersion', serverV); } catch(e) {}
        location.reload(true);
      }
    })
    .catch(function() {});
})();
</script>
</body>
</html>
